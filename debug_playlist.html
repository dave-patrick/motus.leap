<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist - motus.leap</title>
    <meta name="deploy-time" content="1783114500">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        /* Custom scrollbar for the entire page */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #718096;
        }
        /* Smooth transitions */
        .transition-all {
            transition-property: all;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
        /* Dark mode background */
        body {
            background: #0f0f0f;
            color: #e2e8f0;
        }
    </style>
</head>
<body class="dark min-h-screen">
    <!-- Debug Console -->
    <div class="fixed top-4 right-4 bg-gray-900 p-4 rounded-lg shadow-lg max-w-md max-h-64 overflow-y-auto z-50" id="debug-console">
        <div class="flex justify-between items-center mb-2">
            <h3 class="text-red-400 font-bold">Debug Console</h3>
            <button onclick="clearDebug()" class="text-gray-400 hover:text-white">×</button>
        </div>
        <div id="debug-content"></div>
    </div>

    <!-- Debug Button -->
    <button onclick="addDebugInfo()" class="fixed top-4 left-4 bg-red-600 text-white px-3 py-1 rounded-lg hover:bg-red-700 z-50">
        Debug Info
    </button>

    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Navigation -->
        <nav class="flex items-center justify-between mb-6">
            <div class="flex items-center space-x-4">
                <button onclick="backToPlaylists()" class="bg-[#2f8fc9] hover:bg-[#2a7bb9] text-white px-4 py-2 rounded-lg transition-all">
                    <i class="fas fa-arrow-left mr-2"></i> Back to Playlists
                </button>
                <div>
                    <h1 class="text-3xl font-bold text-white">Playlist: <span id="playlist-title">Loading...</span></h1>
                    <div class="flex items-center mt-2">
                        <span id="playlist-privacy" class="text-gray-400 text-sm"></span>
                        <span class="mx-2 text-gray-600">•</span>
                        <span id="playlist-count" class="text-gray-400 text-sm">0 videos</span>
                        <span class="mx-2 text-gray-600">•</span>
                        <span id="playlist-last-updated" class="text-gray-400 text-sm">Never updated</span>
                    </div>
                </div>
            </div>
            <div class="flex space-x-2">
                <button id="rescan-playlist-btn" onclick="rescanPlaylist()" class="bg-[#404348] hover:bg-[#353739] text-white px-4 py-2 rounded-lg transition-all">
                    <i class="fas fa-arrows-rotate mr-2"></i> Rescan
                </button>
            </div>
        </nav>

        <!-- Filters and Actions -->
        <div class="bento-card p-6 rounded-lg bg-[#16181c] mb-6">
            <div class="flex flex-wrap gap-4 items-center justify-between">
                <div class="flex flex-wrap gap-4">
                    <div class="flex-1 min-w-64">
                        <label class="text-gray-400 text-sm">Filter by Channel</label>
                        <input type="text" id="channel-filter" placeholder="Filter by channel..." onkeyup="filterPlaylists('channel')" 
                            class="w-full bg-[#2b2d31] border border-[#42464d] text-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:border-[#2f8fc9]">
                    </div>
                    <div class="flex-1 min-w-64">
                        <label class="text-gray-400 text-sm">Filter by Title</label>
                        <input type="text" id="title-filter" placeholder="Filter by title..." onkeyup="filterPlaylists('title')" 
                            class="w-full bg-[#2b2d31] border border-[#42464d] text-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:border-[#2f8fc9]">
                    </div>
                    <div class="flex-1 min-w-64">
                        <label class="text-gray-400 text-sm">Quick Actions</label>
                        <select id="quick-actions" onchange="quickAction(this.value)" 
                            class="w-full bg-[#2b2d31] border border-[#42464d] text-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:border-[#2f8fc9]">
                            <option value="">Quick Actions</option>
                            <option value="today">Added Today</option>
                            <option value="week">Added This Week</option>
                            <option value="month">Added This Month</option>
                            <option value="download">Download Playlist</option>
                            <option value="export">Export Data</option>
                        </select>
                    </div>
                </div>
                <div class="flex space-x-2">
                    <button id="btn-scan-dup" onclick="scanForDuplicates()" class="bg-[#f87171] hover:bg-[#ef4444] text-white px-4 py-2 rounded-lg transition-all">
                        <i class="fas fa-copy mr-2"></i> Find Duplicates
                    </button>
                    <button id="btn-scan-mis" onclick="scanForMisplaced()" class="bg-[#a78bfa] hover:bg-[#8b5cf6] text-white px-4 py-2 rounded-lg transition-all">
                        <i class="fas fa-random mr-2"></i> Find Misplaced
                    </button>
                    <button onclick="sortPlaylists()" class="bg-[#60a5fa] hover:bg-[#3b82f6] text-white px-4 py-2 rounded-lg transition-all">
                        <i class="fas fa-sort mr-2"></i> Sort
                    </button>
                </div>
            </div>
        </div>

        <!-- Videos List Container -->
        <div class="bento-card p-0 max-w-4xl mx-auto" id="videos-container">
            <div class="p-4 space-y-3" id="videos-skeleton">
                <div class="animate-pulse space-y-3">
                    <div class="h-20 rounded bg-[#1e222a]"></div>
                    <div class="h-3 rounded bg-[#1e222a] w-3/4"></div>
                    <div class="h-3 rounded bg-[#1e222a] w-1/2"></div>
                </div>
                <div class="animate-pulse space-y-3">
                    <div class="h-20 rounded bg-[#1e222a]"></div>
                    <div class="h-3 rounded bg-[#1e222a] w-2/3"></div>
                    <div class="h-3 rounded bg-[#1e222a] w-1/4"></div>
                </div>
            </div>
            <div id="videos-list" class="hidden">
                <!-- Videos will be dynamically loaded here -->
            </div>
        </div>

        <!-- Scan Results Container -->
        <div id="scan-results" class="mt-6">
            <!-- Scan results will be dynamically loaded here -->
        </div>
    </div>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        // Debug functions
        function debug(message) {
            console.log('[DEBUG] ' + message);
            const debugContent = document.getElementById('debug-content');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'text-xs text-gray-300 mb-1';
            entry.innerHTML = `<span class="text-gray-500">[${timestamp}]</span> ${message}`;
            debugContent.appendChild(entry);
            debugContent.scrollTop = debugContent.scrollHeight;
        }

        function clearDebug() {
            document.getElementById('debug-content').innerHTML = '';
        }

        function addDebugInfo() {
            debug('=== PAGE DEBUG INFO ===');
            debug('URL: ' + window.location.href);
            debug('Playlist ID: ' + getPlaylistId());
            debug('Videos container found: ' + !!document.getElementById('videos-container'));
            debug('Videos skeleton found: ' + !!document.getElementById('videos-skeleton'));
            debug('Videos list found: ' + !!document.getElementById('videos-list'));
            debug('Document ready state: ' + document.readyState);
            debug('Number of scripts loaded: ' + document.scripts.length);
            
            const scripts = Array.from(document.scripts);
            scripts.forEach((script, index) => {
                debug(`Script ${index + 1}: ${script.src || 'inline'}`);
            });
        }

        // Initialize debug console
        debug('Playlist page loaded');
        debug('DOMContentLoaded fired');
        
        // Enhanced initialization
        async function initPlaylistPage() {
            debug('Starting initPlaylistPage');
            addDebugInfo();
            
            const container = document.getElementById('videos-container');
            if (!container) {
                debug('ERROR: Videos container not found!');
                return;
            }
            debug('Videos container found successfully');
            
            await loadPlaylist();
            debug('Playlist loading completed');
            
            // Add event listeners
            document.getElementById('rescan-playlist-btn')?.addEventListener('click', rescanPlaylist);
            document.getElementById('btn-scan-dup')?.addEventListener('click', scanForDuplicates);
            document.getElementById('btn-scan-mis')?.addEventListener('click', scanForMisplaced);
        }

        // Load playlist data
        async function loadPlaylist() {
            debug('Starting loadPlaylist');
            const container = document.getElementById('videos-container');
            const skeleton = document.getElementById('videos-skeleton');
            const videosList = document.getElementById('videos-list');
            
            if (!container) {
                debug('ERROR: Container not found in loadPlaylist');
                return;
            }
            
            if (skeleton) skeleton.classList.remove('hidden');
            if (videosList) videosList.classList.add('hidden');
            
            try {
                debug('Fetching playlist data...');
                const response = await fetch('/api/playlists');
                debug('Response status: ' + response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                debug('Playlist data received');
                
                // Update UI with playlist data
                document.getElementById('playlist-title').textContent = data.title || 'Unknown Playlist';
                document.getElementById('playlist-count').textContent = `${data.video_count || 0} videos`;
                
                // Render videos
                renderVideos(data.videos || []);
                debug('Videos rendered successfully');
                
            } catch (error) {
                debug('Error in loadPlaylist: ' + error.message);
                container.innerHTML = '<div class="text-center p-8 text-red-400">Failed to load playlist data: ' + error.message + '</div>';
            }
        }

        // Render videos
        function renderVideos(videos) {
            debug('Rendering videos: ' + videos.length + ' videos');
            const container = document.getElementById('videos-container');
            if (!container) {
                debug('ERROR: Videos container not found in renderVideos');
                return;
            }
            
            const skeleton = document.getElementById('videos-skeleton');
            const videosList = document.getElementById('videos-list');
            
            if (skeleton) skeleton.classList.add('hidden');
            if (videosList) videosList.classList.remove('hidden');
            
            if (!videos.length) {
                container.innerHTML = '<div class="text-center p-8 text-gray-400">No videos in this playlist</div>';
                return;
            }
            
            const html = videos.map(video => {
                return `
                    <div class="bg-[#16181c] rounded-lg p-4 hover:bg-[#1e222a] transition-all">
                        <div class="flex items-center space-x-4">
                            <img src="${video.thumbnail || 'https://i.ytimg.com/vi/default/mqdefault.jpg'}" 
                                alt="${video.title}" class="w-20 h-12 object-cover rounded">
                            <div class="flex-1">
                                <h3 class="text-white font-medium">${video.title || 'Unknown Title'}</h3>
                                <p class="text-gray-400 text-sm">${video.channel || 'Unknown Channel'}</p>
                                <p class="text-gray-500 text-xs">${video.duration || '0:00'}</p>
                            </div>
                            <div class="flex space-x-2">
                                <button onclick="refreshVideo('${video.id}')" class="text-gray-400 hover:text-white">
                                    <i class="fas fa-refresh"></i>
                                </button>
                                <button onclick="openVideo('${video.id}')" class="text-gray-400 hover:text-white">
                                    <i class="fas fa-external-link-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            videosList.innerHTML = html;
            debug('Videos list populated successfully');
        }

        // Navigation functions
        function backToPlaylists() {
            debug('Navigating back to playlists');
            window.location.href = '/playlists';
        }

        function getPlaylistId() {
            const pathParts = window.location.pathname.split('/');
            return pathParts[pathParts.length - 1];
        }

        // Initialize on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initPlaylistPage);
        } else {
            initPlaylistPage();
        }
    </script>
</body>
</html>
