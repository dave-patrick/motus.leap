    <div id="create-playlist-modal" class="hidden fixed inset-0 z-50 p-4">
        <div class="absolute inset-0 bg-black/60" onclick="closeCreatePlaylistModal()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md bento-card p-6 mx-4">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-sm font-semibold text-white">Create New Playlist</h3>
                <button onclick="closeCreatePlaylistModal()" class="text-gray-400 hover:text-white text-xs">Close</button>
            </div>
            <div class="flex flex-col gap-3">
                <div>
                    <label class="text-[10px] text-gray-300">Title</label>
                    <input id="cp-title" type="text" class="mt-1 w-full bg-[#0f1115] border border-[#2a2f3a] rounded-lg px-3 py-2 text-sm text-white outline-none focus:border-[#2f8fc9]" placeholder="My New Playlist">
                </div>
                <div>
                    <label class="text-[10px] text-gray-300">Description</label>
                    <textarea id="cp-desc" rows="3" class="mt-1 w-full bg-[#0f1115] border border-[#2a2f3a] rounded-lg px-3 py-2 text-sm text-white outline-none focus:border-[#2f8fc9]" placeholder="Optional description"></textarea>
                </div>
                <div>
                    <label class="text-[10px] text-gray-300">Privacy</label>
                    <select id="cp-privacy" class="mt-1 w-full bg-[#0f1115] border border-[#2a2f3a] rounded-lg px-3 py-2 text-sm text-white outline-none">
                        <option value="private">Private</option>
                        <option value="public">Public</option>
                        <option value="unlisted">Unlisted</option>
                    </select>
                </div>
                <button onclick="submitCreatePlaylist()" class="mt-2 bg-[#2f8fc9] hover:bg-[#2a7db8] text-white text-xs font-medium px-4 py-2 rounded-lg">Create Playlist</button>
            </div>

    <script>
    function openCreatePlaylistModal() { document.getElementById('create-playlist-modal').classList.remove('hidden'); }
    function closeCreatePlaylistModal() { document.getElementById('create-playlist-modal').classList.add('hidden'); }
    async function submitCreatePlaylist() {
        const title = document.getElementById('cp-title').value.trim();
        const description = document.getElementById('cp-desc').value.trim();
        const privacy = document.getElementById('cp-privacy').value;
        if (!title) return alert('Title is required');
        const resp = await authFetch('/api/youtube/playlists/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, description, privacy })
        });
        if (!resp.ok) return alert('Failed to create playlist');
        closeCreatePlaylistModal();
        loadPlaylists();
    }
    </script>
