<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <title>Subscriptions - motus.leap</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
        <script src="/static/shared-shell.js?v=20260719a"></script>
<script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/ux-enhancements.css?v=20260719a">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f1115; color: #e5e5e5; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .bento-card { background-color: #1a1d24; border: 1px solid #2a2f3a; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        .nav-item.active { background-color: #2f8fc9; color: #ffffff; }
        .nav-item:not(.active):hover { background-color: #2a2f3a; color: #ffffff; }
    
        @font-face {
            font-family: 'Deltha';
            src: url('/static/Deltha.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        .site-title { font-family: 'Deltha', serif; font-weight: normal !important; }
</style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="/static/auth-check.js"></script>
    <script src="/static/global_scripts.js?v=1781919149"></script>
    <script src="/static/ux-enhancements.js?v=20260719a"></script>
</head>
<body class="bg-[#0f1115] min-h-screen flex flex-col selection:bg-[#2f8fc9]/30">
    <!-- ===== FULL-WIDTH TOP HEADER ===== -->
    <!-- Left Sidebar -->
    <div class="flex flex-1 min-h-0 overflow-hidden">
        <!-- Top Header -->
 
        <main class="flex-1 overflow-y-auto p-4 md:p-6 bg-[#0f1115]">
            <div class="flex flex-col gap-4 max-w-[1600px] w-full">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold text-white">Subscriptions</h2>
                    <div class="flex gap-2">
                        <button onclick="openSubscribeModal()" class="bg-[#2f8fc9] hover:bg-[#2a7db8] text-white text-xs font-medium px-4 py-2 rounded-lg flex items-center gap-2"><i class="fa-solid fa-plus"></i> Subscribe</button>
                        <button onclick="refreshSubscriptions()" class="bg-[#2f8fc9] hover:bg-[#2a7db8] text-white text-xs font-medium px-4 py-2 rounded-lg flex items-center gap-2"><i class="fa-solid fa-sync"></i> Refresh</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5" id="subscriptions-list">
                    <div class="col-span-full text-center text-gray-400 py-8">Loading...</div>
                </div>
            </div>
        
    <div id="subscribe-channel-modal" class="hidden fixed inset-0 z-50 p-4">
        <div class="absolute inset-0 bg-black/60" onclick="closeSubscribeModal()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md bento-card p-6 mx-4">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-sm font-semibold text-white">Subscribe to Channel</h3>
                <button onclick="closeSubscribeModal()" class="text-gray-400 hover:text-white text-xs">Close</button>
            </div>
            <div class="flex flex-col gap-3">
                <div>
                    <label class="text-[10px] text-gray-300">Channel ID or URL</label>
                    <input id="sub-id" type="text" class="mt-1 w-full bg-[#0f1115] border border-[#2a2f3a] rounded-lg px-3 py-2 text-sm text-white outline-none focus:border-[#2f8fc9]" placeholder="UCxxxx... or channel link">
                </div>
                <button onclick="submitSubscribe()" class="mt-2 bg-[#2f8fc9] hover:bg-[#2a7db8] text-white text-xs font-medium px-4 py-2 rounded-lg">Subscribe</button>
            </div>
        </div>
    </div>

    <div id="sub-maint-modal" class="hidden fixed inset-0 z-50">
        <div class="absolute inset-0 bg-black/60" onclick="closeMaintenanceModal()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-lg bento-card">
            <div class="p-4 border-b border-[#2a2f3a] flex items-center justify-between">
                <div>
                    <div class="text-xs font-semibold text-gray-300">Playlist Maintenance</div>
                    <div class="text-[10px] text-gray-400" id="sub-maint-title">Channel</div>
                </div>
                <button onclick="closeMaintenanceModal()" class="text-gray-400 hover:text-white text-xs">Close</button>
            </div>
            <div class="p-4 flex flex-col gap-3">
                <div class="text-[10px] text-gray-400">Mapped playlist: <span id="sub-maint-playlist" class="text-gray-300">-</span></div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bento-card p-4"><div class="text-[10px] text-gray-400">Duplicates</div><div class="text-xs text-gray-200" id="sub-maint-dupes">-</div></div>
                    <div class="bento-card p-4"><div class="text-[10px] text-gray-400">Misplaced</div><div class="text-xs text-gray-200" id="sub-maint-misplaced">-</div></div>
                </div>
                <div class="text-[10px] text-gray-400" id="sub-maint-note"></div>
                <div class="hidden items-center gap-2 text-[10px] text-gray-300" id="sub-maint-next"><input type="checkbox" class="rounded bg-[#20242c] border border-[#2a2f3a]"> Queue cleanup for this playlist</div>
            </div>
        </div>
    </div>
    <script src="/static/subscriptions.js?v=20260709c"></script>
    <script src="/static/mobile-nav.js?v=20260715e"></script>

    <script>
    function openSubscribeModal() { document.getElementById('subscribe-channel-modal').classList.remove('hidden'); }
    function closeSubscribeModal() { document.getElementById('subscribe-channel-modal').classList.add('hidden'); }
    async function submitSubscribe() {
        const raw = document.getElementById('sub-id').value.trim();
        const m = raw.match(/channel\/([A-Za-z0-9_-]+)/) || raw.match(/([A-Za-z0-9_-]{20,})/);
        const channel_id = m ? m[1] : raw;
        const resp = await fetch('/api/subscriptions/subscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ channel_id })
        });
        if (!resp.ok) return alert('Failed to subscribe');
        closeSubscribeModal();
        refreshSubscriptions();
    }
    </script>
</main>
    </div>
</body>
</html>
