<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <title>Playlist - motus.leap</title>
    <link rel="icon" type="image/png" href="/static/favicon.png?v=20260717e">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png?v=20260717e">
    <link rel="manifest" href="/static/manifest.json">
        <script src="/static/shared-shell.js?v=20260719i"></script>
<script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #121419; color: #e5e5e5; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .bento-card { background-color: #1a1d24; border: 1px solid #2a2f3a; border-radius: 12px; }
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        .video-row { border-top: 1px solid #2a2f3a; padding: 8px 12px; transition: background-color 0.2s; }
        .video-row:hover { background-color: #20242c; }
        .video-row.selected { background-color: rgba(47, 143, 201, 0.2); }
        
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slide-out {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(100%); }
        }
        .animate-slide-in { animation: slide-in 0.3s ease-out; }
        .animate-slide-out { animation: slide-out 0.3s ease-in; }
    
        @font-face {
            font-family: 'Deltha';
            src: url('/static/Deltha.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        .site-title { font-family: 'Deltha', serif; font-weight: normal !important; }
        .nav-item.active { background-color: #2f8fc9; color: #ffffff; }
        .nav-item:not(.active):hover { background-color: rgba(255, 255, 255, 0.1); }
</style>
    <link rel="stylesheet" href="/static/ux-enhancements.css?v=20260719i">
    <script src="/static/ux-enhancements.js?v=20260719i"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="/static/global_scripts.js?v=1781919149"></script>
    <script src="/static/auth-check.js?v=1781919149"></script>
</head>
<body class="min-h-screen flex flex-col selection:bg-[#2f8fc9]/30">
    <!-- ===== FULL-WIDTH TOP HEADER ===== -->
    <!-- Playlist context bar (below header) -->
    <div class="px-6 py-2 bg-[#16191f] border-b border-[#2a2f3a] flex items-center gap-3">
        <button onclick="window.location.href='/playlists'" class="text-gray-400 hover:text-white text-xs flex items-center gap-1"><i class="fa-solid fa-arrow-left"></i> Back to Playlists</button>
        <span class="text-gray-600">|</span>
        <span class="text-xs text-gray-300" id="playlist-title">Loading...</span>
        <span class="text-[10px] text-gray-500" id="playlist-meta">-- videos</span>
        <button id="move-btn" onclick="moveSelectedVideos()" class="ml-auto bg-[#2f8fc9] hover:bg-[#2a7db8] text-white text-[10px] font-medium px-3 py-1.5 rounded-lg flex items-center gap-1.5 hidden"><i class="fa-solid fa-up-right-and-down-left-from-center"></i> Move Selected</button>
    </div>
    <div class="flex flex-1 overflow-hidden">
    <main class="flex-1 overflow-y-auto p-4 bg-[#121419]">
            <div class="flex flex-col gap-3  max-w-[1600px] mx-auto w-full">
                
                <!-- Operations Panel (Scan Buttons and Results Box) -->
                <div class="bento-card p-4 flex flex-col gap-3 shrink-0">
                    <div class="flex items-center justify-between">
                        <div>
                            <h3 class="text-xs font-semibold text-white">Playlist Operations</h3>
                            <p class="text-[10px] text-gray-400">Rescan videos, scan for duplicate entries, or detect misplaced videos based on your rules.</p>
                        </div>
                        <div class="flex gap-2">
                            <button id="rescan-playlist-btn" class="bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-[11px] font-semibold px-4 py-2.5 rounded-lg flex items-center gap-1.5 transition-colors"><i class="fa-solid fa-arrows-rotate text-[#2f8fc9]"></i> Rescan Playlist</button>
                            <button id="btn-scan-dup" class="bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-[11px] font-semibold px-4 py-2.5 rounded-lg flex items-center gap-1.5 transition-all"><i class="fa-solid fa-copy text-[#2f8fc9]"></i> Scan for Duplicates</button>
                            <button id="btn-scan-mis" class="bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-[11px] font-semibold px-4 py-2.5 rounded-lg flex items-center gap-1.5 transition-all"><i class="fa-solid fa-triangle-exclamation text-yellow-500"></i> Scan for Misplaced</button>
                        </div>
                    </div>
                    
                    <!-- Scan Results Box (hidden initially) -->
                    <div id="scan-results-box" class="hidden border border-[#2a2f3a] bg-[#16191f] rounded-lg p-3">
                        <div class="flex items-center justify-between mb-2.5 pb-2 border-b border-[#2a2f3a]">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-bold text-white flex items-center gap-1.5"><i class="fa-solid fa-clipboard-list text-[#2f8fc9]"></i> Scan Results</span>
                                <span id="scan-results-summary" class="text-[9px] text-gray-400 px-1.5 py-0.5 rounded bg-[#20242c] border border-[#2a2f3a]"></span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button id="delete-duplicates-btn" class="hidden bg-red-950/50 hover:bg-red-900/50 border border-red-500/30 text-red-200 text-[10px] font-bold px-3 py-1.5 rounded-lg flex items-center gap-2 transition-colors">
                                    <i class="fa-solid fa-trash-can"></i> Delete Duplicates
                                </button>
                                <button id="move-misplaced-btn" class="hidden bg-[#2f8fc9] hover:bg-[#2a7db8] text-white text-[10px] font-bold px-3 py-1.5 rounded-lg flex items-center gap-2 transition-colors">
                                    <i class="fa-solid fa-share-from-square"></i> Move Misplaced
                                </button>
                                <label for="scan-filter" class="text-[10px] text-gray-400 font-medium">Filter Results:</label>
                                <select id="scan-filter" onchange="filterScanResults()" class="bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-[10px] rounded px-2.5 py-1 outline-none font-semibold cursor-pointer">
                                    <option value="all">All Issues</option>
                                    <option value="duplicates">Duplicates only</option>
                                    <option value="misplaced">Misplaced only</option>
                                </select>
                            </div>
                        </div>
                        <div id="scan-results-list" class="space-y-1.5 max-h-48 overflow-y-auto font-mono text-[11px] text-gray-300">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                </div>

                <!-- Videos List Container -->
                <div class="bento-card p-0 max-w-4xl mx-auto" id="videos-container">
                    <div class="p-4 space-y-3" id="videos-skeleton">
                        <div class="animate-pulse space-y-3">
                            <div class="h-20 rounded bg-[#1e222a]"></div>
                            <div class="h-3 rounded bg-[#1e222a] w-3/4"></div>
                            <div class="h-3 rounded bg-[#1e222a] w-1/2"></div>
                        </div>
                        <div class="animate-pulse space-y-3">
                            <div class="h-20 rounded bg-[#1e222a]"></div>
                            <div class="h-3 rounded bg-[#1e222a] w-2/3"></div>
                            <div class="h-3 rounded bg-[#1e222a] w-1/3"></div>
                        </div>
                    </div>
                    <div class="hidden p-4" id="videos-list"></div>
                </div>
            </div>
        <script src="/static/playlist.js?v=20260709b"></script>
        <script src="/static/mobile-nav.js"></script>
    </main>
    </div>
</body>
</html>
