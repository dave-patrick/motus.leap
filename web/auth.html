<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <title>Authentication - motus.leap</title>
    <link rel="icon" type="image/png" href="/static/favicon.png?v=20260717e">
    <link rel="apple-touch-icon" href="/static/logo_icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-[#0f1115] min-h-screen flex items-center justify-center selection:bg-[#2f8fc9]/30">
    <div class="w-full max-w-sm mx-auto px-4">
        <div class="bg-[#1a1d24] border border-[#2a2f3a] rounded-2xl p-8 text-center shadow-xl">
            <div class="mb-6">
                <img src="/static/logo_icon.png?v=20260717e" alt="motus.leap" class="w-16 h-16 mx-auto object-contain mb-4">
            </div>
            <div class="text-4xl mb-4" id="status-icon"></div>
            <h1 class="text-xl font-semibold text-white mb-2" id="status-title"></h1>
            <p class="text-gray-400 text-sm mb-6" id="status-message"></p>
            <div class="text-gray-500 text-xs" id="redirect-msg"></div>
            <a id="back-link" href="/dashboard" class="hidden mt-4 inline-block bg-[#2f8fc9] hover:bg-[#2a7db8] text-white text-sm font-medium px-6 py-3 rounded-lg transition-colors min-h-[44px] flex items-center justify-center">Go to Dashboard</a>
        </div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const status = params.get('status');
            const type = params.get('type') || '';
            const error = params.get('error') || '';

            const icon = document.getElementById('status-icon');
            const title = document.getElementById('status-title');
            const message = document.getElementById('status-message');
            const redirect = document.getElementById('redirect-msg');
            const backLink = document.getElementById('back-link');

            if (status === 'success' && type === 'youtube') {
                icon.innerHTML = '<i class="fa-solid fa-circle-check text-green-400"></i>';
                title.textContent = 'YouTube Connected!';
                message.textContent = 'Your YouTube account has been linked. You can close this window.';
                try { window.opener && window.opener.postMessage({type: 'youtube-oauth-success'}, '*'); } catch(e) {}
                redirect.textContent = 'Closing window shortly...';
                setTimeout(() => window.close(), 1500);
            } else if (status === 'error') {
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-400"></i>';
                title.textContent = 'OAuth Error';
                message.textContent = error || 'Something went wrong during authentication.';
                try { window.opener && window.opener.postMessage({type: 'youtube-oauth-error', error: error || 'Unknown error'}, '*'); } catch(e) {}
                backLink.classList.remove('hidden');
                backLink.textContent = 'Return to Dashboard';
                backLink.href = '/dashboard';
            } else {
                icon.innerHTML = '<i class="fa-solid fa-lock text-gray-500"></i>';
                title.textContent = 'Authentication';
                message.textContent = 'Please sign in to access your playlists.';
                backLink.classList.remove('hidden');
                backLink.textContent = 'Sign in with Google';
                backLink.href = '/api/auth/google';
            }
        })();
    </script>
    <div class="mt-6 pt-4 border-t border-[#2a2f3a] text-center">
        <a href="/terms" class="text-xs text-gray-400 hover:text-[#2f8fc9] transition-colors">Terms of Use</a>
        <span class="mx-2 text-gray-600">·</span>
        <a href="/privacy" class="text-xs text-gray-400 hover:text-[#2f8fc9] transition-colors">Privacy Policy</a>
    </div>
</body>
</html>
