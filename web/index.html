<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tube Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: system-ui, sans-serif; background: #121419; color: #e5e5e5; }
        .card { background: #1a1d24; border: 1px solid #2a2f3a; border-radius: 12px; padding: 20px; margin: 10px 0; }
        .ok { color: #44ff88; } .err { color: #ff4444; }
        #app { padding: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <h1>Tube Manager</h1>
        <div class="card"><span class="ok">✓</span> HTML renders</div>
        <div class="card" id="api">Testing API...</div>
        <div class="card" id="ws">WebSocket...</div>
        <div class="card" id="js-error" style="display:none"></div>
    </div>
    <script>
        window.onerror = (msg, src, line, col, err) => {
            const d = document.getElementById('js-error');
            d.style.display = 'block';
            d.innerHTML = '<span class="err">JS Error:</span> ' + msg + ' at ' + (src||'') + ':' + line;
            console.error(msg, src, line, col, err);
        };
        
        console.log('[TEST] Script started');
        
        fetch('/api/stats')
            .then(r => r.json())
            .then(d => {
                document.getElementById('api').innerHTML = '<span class="ok">✓</span> API: ' + JSON.stringify(d).slice(0,100);
            })
            .catch(e => {
                document.getElementById('api').innerHTML = '<span class="err">✗</span> API: ' + e.message;
            });
        
        try {
            const ws = new WebSocket('wss://tubemanager.onrender.com/ws/terminal');
            ws.onopen = () => {
                document.getElementById('ws').innerHTML = '<span class="ok">✓</span> WebSocket connected';
                ws.close();
            };
            ws.onerror = () => {
                document.getElementById('ws').innerHTML = '<span class="err">✗</span> WebSocket failed';
            };
        } catch (e) {
            document.getElementById('ws').innerHTML = '<span class="err">✗</span> WS: ' + e.message;
        }
    </script>
</body>
</html>
