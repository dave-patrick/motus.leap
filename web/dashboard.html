<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta property="og:title" content="motus.leap — YouTube Playlist Manager">
    <meta property="og:description" content="Automated YouTube playlist orchestrator">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>motus.leap</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png?v=20260717e">
        <script src="/static/shared-shell.js?v=20260719m"></script>
<script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/ux-enhancements.css?v=20260719m">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f1115; color: #e5e5e5; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .accent { color: #2f8fc9; }
        .accent-bg { background-color: #2f8fc9; }
        .accent-border { border-color: #2f8fc9; }
        .accent-glow { filter: drop-shadow(0 0 5px rgba(47, 143, 201, 0.6)); }
        .status-badge { background-color: #0f766e; border: 1px solid #0f766e; color: #67e8f9; }
        .bento-card { background-color: #1a1d24; border: 1px solid #2a2f3a; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        .console-line { border-left: 2px solid transparent; padding-left: 6px; }
        .console-line.info { border-color: #2f8fc9; }
        .console-line.success { border-color: #22c55e; }
        .console-line.error { border-color: #ef4444; }
        .console-line.warn { border-color: #f59e0b; }
        .nav-item.active { background-color: #2f8fc9; color: #ffffff; }
        .nav-item:not(.active):hover { background-color: #2a2f3a; color: #ffffff; }
        @font-face {
            font-family: 'Deltha';
            src: url('/static/Deltha.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        .site-title { font-family: 'Deltha', serif; font-weight: normal !important; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="/static/auth-check.js"></script>
    <script src="/static/global_scripts.js?v=1781919149"></script>
</head>
<body class="bg-[#0f1115] min-h-screen flex flex-col selection:bg-[#2f8fc9]/30">

    <!-- ===== FULL-WIDTH TOP HEADER INJECTED BY SHARED-SHELL ===== -->

        <main class="flex-1 min-h-0 p-6 pb-4 bg-[#0f1115] overflow-y-auto">
            <div class="flex flex-col gap-6 max-w-[1600px] w-full">

                <h3 class="text-2xl font-bold text-white">Dashboard</h3>

                <!-- Stats Grid -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bento-card p-4">
                        <div class="text-[10px] text-gray-400 uppercase tracking-wider mb-1">Playlists</div>
                        <div class="text-2xl font-bold text-white" id="stat-playlists">--</div>
                    </div>
                    <div class="bento-card p-4">
                        <div class="text-[10px] text-gray-400 uppercase tracking-wider mb-1">Videos</div>
                        <div class="text-2xl font-bold text-white" id="stat-videos">--</div>
                    </div>
                    <div class="bento-card p-4">
                        <div class="text-[10px] text-gray-400 uppercase tracking-wider mb-1">Subscriptions</div>
                        <div class="text-2xl font-bold text-white" id="stat-subscriptions">--</div>
                    </div>
                </div>

                <!-- Agent Control Center -->
                <div class="bento-card p-5 max-w-3xl">
                    <h4 class="text-xs font-semibold text-gray-300 mb-4 flex items-center gap-2"><i class="fas fa-robot accent"></i> Agent Control Center</h4>
                    <div class="flex flex-wrap items-center justify-start gap-3">
                        <button id="btn-fetch-all" data-refresh="stats" class="px-4 py-2.5 rounded-lg bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 hover:text-white text-xs font-semibold flex items-center gap-2 transition-colors"><i class="fa-solid fa-arrows-rotate text-[#2f8fc9]"></i> Full Playlist Sync</button>
                        <button id="btn-maintenance" data-refresh="stats" class="px-4 py-2.5 rounded-lg bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 hover:text-white text-xs font-semibold flex items-center gap-2 transition-colors"><i class="fas fa-wrench text-[#2f8fc9]"></i> Run Maintenance</button>
                    </div>
                </div>

                <!-- Scan Details -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bento-card p-5 lg:col-span-1 flex flex-col">
                        <h4 class="text-xs font-semibold text-gray-300 mb-4 flex items-center gap-2"><i class="fas fa-radar accent"></i> Scan Details</h4>
                        <div class="space-y-3 text-xs text-gray-400">
                            <div class="flex justify-between border-b border-[#2a2f3a] pb-2"><span>Last Scan</span><span id="last-scan" class="text-gray-300 font-mono">--</span></div>
                            <div class="flex justify-between border-b border-[#2a2f3a] pb-2"><span>Status</span><span id="scan-status" class="text-[#2f8fc9] font-medium">Idle</span></div>
                            <div class="flex justify-between border-b border-[#2a2f3a] pb-2"><span>Queued Tasks</span><span id="queued-tasks" class="text-gray-300 font-mono">0</span></div>
                            <div class="flex justify-between"><span>Active Workers</span><span id="active-workers" class="text-gray-300 font-mono">0</span></div>
                        </div>
                        <div class="pt-3 border-t border-[#2a2f3a]">
                            <div class="flex justify-between mb-1.5"><span class="text-gray-400">System Activity</span><span id="activity-pct" class="text-gray-300 font-mono">0%</span></div>
                            <div class="w-full bg-[#20242c] rounded-full h-2 overflow-hidden">
                                <div id="activity-bar" class="bg-[#2f8fc9] h-2 rounded-full transition-all duration-500" style="width:0%"></div>
                            </div>
                        </div>
                        <button id="btn-run-scan" class="w-full mt-auto px-3 py-2 rounded-lg accent-bg hover:bg-[#2a7db8] text-white text-[11px] font-bold flex items-center justify-center gap-2 transition-colors">
                            <i class="fas fa-search"></i> Run Scan
                        </button>
                        <button id="scan-cancel-btn" class="hidden w-full mt-2 px-3 py-2 rounded-lg bg-red-950/50 hover:bg-red-900/50 border border-red-500/30 text-red-200 text-[11px] font-bold flex items-center justify-center gap-2 transition-colors">
                            <i class="fa-solid fa-stop"></i> Cancel Running Task
                        </button>
                        <button id="btn-cancel" class="hidden" onclick="fetch('/api/action/cancel',{method:'POST',headers:{'X-CSRF-Protect':'1'}}).catch(e=>console.warn(e))"></button>
                    </div>
                </div>

                <!-- Slim footer -->
                </div>
            <!-- Slim footer -->
            </div>
            
        <script src="/static/dashboard.js?v=3"></script>
        <script src="/static/ux-enhancements.js?v=20260719m"></script>
        <script src="/static/mobile-nav.js?v=20260715f"></script>
        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/static/sw.js').catch(() => {});
                });
            }
            var touchStartY = 0;
            document.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
            document.addEventListener('touchend', (e) => {
                const touchEndY = e.changedTouches[0].clientY;
                if (touchEndY - touchStartY > 150 && window.scrollY === 0) window.location.reload();
            }, { passive: true });
        </script>
    </main>
</body>
</html>
