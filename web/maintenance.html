<body class="bg-[#0f1115] min-h-screen flex flex-col selection:bg-[#2f8fc9]/30">
    <!-- ===== FULL-WIDTH TOP HEADER ===== -->
    <!-- Left Sidebar -->
    <div class="flex flex-1 min-h-0 overflow-hidden">
        <!-- Top Header -->

        <main class="flex-1 overflow-y-auto p-6 pb-4 bg-[#0f1115]">
            <div class="flex flex-col gap-4 max-w-[1600px] w-full">
                <h2 class="text-xl font-bold text-white">Maintenance Queue</h2>
                <div class="flex items-center gap-2"><a href="/bulk" class="px-3 py-2 rounded-lg bg-[#2f8fc9] text-white text-xs font-semibold">Bulk Operations</a></div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    <div class="bento-card flex flex-col overflow-hidden">
                        <div class="px-4 py-3 border-b border-[#2a2f3a] flex justify-between items-center">
                            <h3 class="text-xs font-semibold text-gray-300">Duplicated Videos</h3>
                            <button onclick="applyMaintenance('dup')" class="bg-[#2f8fc9] hover:bg-[#2a7db8] text-white text-xs py-1 px-2 rounded">Resolve All</button>
                        </div>
                        <div class="p-3 overflow-y-auto flex-1" id="dup-queue">Loading...</div>
                    </div>
                    <div class="bento-card flex flex-col overflow-hidden">
                        <div class="px-4 py-3 border-b border-[#2a2f3a] flex justify-between items-center">
                            <h3 class="text-xs font-semibold text-gray-300">Misplaced Videos</h3>
                            <button onclick="applyMaintenance('misplaced')" class="bg-[#2f8fc9] hover:bg-[#2a7db8] text-white text-xs py-1 px-2 rounded">Fix All</button>
                        </div>
                        <div class="p-3 overflow-y-auto flex-1" id="misplaced-queue">Loading...</div>
                    </div>
                    <div class="bento-card flex flex-col overflow-hidden">
                        <div class="px-4 py-3 border-b border-[#2a2f3a] flex justify-between items-center">
                            <h3 class="text-xs font-semibold text-gray-300">Move from X to Y</h3>
                            <button onclick="applyMaintenance('move')" class="bg-[#2f8fc9] hover:bg-[#2a7db8] text-white text-xs py-1 px-2 rounded">Apply All</button>
                        </div>
                        <div class="p-3 overflow-y-auto flex-1" id="move-queue">Loading...</div>
                    </div>
                </div>
            </div>
        <script>
        // Toast notification system
        function toast(message, type = 'info', duration = 4000) {
            const container = document.getElementById('toast-container') || createToastContainer();
            const toast = document.createElement('div');
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            const colors = {
                success: 'bg-green-600',
                error: 'bg-red-600',
                warning: 'bg-yellow-600',
                info: 'bg-[#2f8fc9]'
            };
            toast.className = `flex items-center gap-2 px-4 py-3 rounded-lg shadow-lg text-white text-xs font-medium animate-slide-in ${colors[type] || colors.info}`;
            toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.info}"></i><span class="flex-1">${DOMPurify.sanitize(message, {USE_PROFILES: {html: true}})}</span><button onclick="this.parentElement.remove()" class="ml-2 text-white/70 hover:text-white focus:outline-none p-0.5 cursor-pointer" title="Close"><i class="fa-solid fa-xmark text-xs"></i></button>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('animate-slide-out');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.id = 'toast-container';
            container.className = 'fixed top-4 right-4 z-50 flex flex-col gap-2 w-80';
            document.body.appendChild(container);
            return container;
        }
        var maintenanceData = {};
        
        // Build a thumbnail URL straight from a YouTube video_id (no extra API cost).
        function maintenanceThumb(videoId) {
            if (!videoId) return 'https://picsum.photos/32/24';
            return `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
        }
        
        async function loadMaintenance() {
            try {
                const response = await fetch('/api/maintenance');
                if (!response.ok) throw new Error('Failed to load');
                maintenanceData = await response.json();
                renderQueue('move-queue', maintenanceData.move_from_x_to_y || [], 'move');
                renderQueue('dup-queue', maintenanceData.duplicated_videos || [], 'dup');
                renderQueue('misplaced-queue', maintenanceData.misplaced_videos || [], 'misplaced');
            } catch (e) {
                console.error(e);
            }
        }
        
        function renderQueue(elId, items, type) {
            const el = document.getElementById(elId);
            if (!items.length) { 
                el.innerHTML = '<div class="text-[10px] text-gray-400 text-center py-4">No items</div>'; 
                return; 
            }
            el.innerHTML = items.map(item => {
                const _vid = DOMPurify.sanitize(item.video_id || '');
                const _thumb = DOMPurify.sanitize(maintenanceThumb(item.video_id || ''));
                const _title = DOMPurify.sanitize(item.video_title || item.title || '');
                // Resolve real playlist NAMES (fall back to the raw ID only as last resort).
                let _from = '', _fromId = '', _to = '', _toId = '', _plText = '';
                if (type === 'misplaced') {
                    _from = item.current_playlist_title || item.current_playlist_id || '';
                    _fromId = item.current_playlist_id || '';
                    _to = item.mapped_playlist_title || item.mapped_playlist_id || '';
                    _toId = item.mapped_playlist_id || '';
                } else if (type === 'move') {
                    _from = item.source_playlist_title || item.source_playlist_id || '';
                    _fromId = item.source_playlist_id || '';
                    _to = item.target_playlist_title || item.target_playlist_id || '';
                    _toId = item.target_playlist_id || '';
                } else if (type === 'dup') {
                    const _pls = Array.isArray(item.playlists) ? item.playlists : [];
                    _plText = _pls.map(p => DOMPurify.sanitize(p.title || p.id || '')).join(', ');
                }
                const _fromTo = (_from && _to) ? `${_from} → ${_to}` : (_plText || '?');
                const _selId = `sel-${elId}-${item.video_id || 'x'}`;
                // Duplicate-specific extras (re-upload / multi-playlist aware)
                const _copies = item.copy_count ? Number(item.copy_count) : 0;
                const _exact = item.exact_duplicate;
                const _dupMeta = type === 'dup' && _copies
                    ? `<span class="text-[9px] ${_exact ? 'text-yellow-400' : 'text-orange-400'}">${_copies} copies${_exact ? ' (same ID)' : ' (re-upload)'}</span>`
                    : '';
                // For a duplicate, remove the second (non-primary) copy by default.
                const _pls = Array.isArray(item.playlists) ? item.playlists : [];
                const _removePl = _pls[1] || _pls[0] || {};
                const _removePlId = _removePl.id || '';
                const _removeVid = _removePl.video_id || item.video_id || '';
                const _removePli = _removePl.playlist_item_id || '';
                let _controls = '';
                if (type === 'move') {
                    _controls = `<select id="${_selId}" class="bg-[#2f8fc9] text-white text-[10px] rounded px-2 py-1 w-32 outline-none border-none"><option value="${DOMPurify.sanitize(_toId)}">${_to || 'Move from X to Y'}</option></select>` +
                        `<button onclick="maintMove('${item.video_id}', '${item.source_playlist_id}', 'move', '${_selId}', this)" class="bg-[#2f8fc9] text-white text-[10px] px-2 py-1 rounded">Move</button>`;
                } else if (type === 'dup') {
                    _controls = `<div class="flex gap-1"><button onclick="maintKeep('${item.video_id}', 'dup', this)" class="bg-[#2f8fc9] text-white text-[10px] px-2 py-1 rounded">Keep</button><button onclick="maintRemove('${_removeVid}', '${_removePlId}', 'dup', this, '${_removePli}')" class="bg-[#2a2f3a] text-gray-300 text-[10px] px-2 py-1 rounded">Remove</button></div>`;
                } else if (type === 'misplaced') {
                    _controls = `<select id="${_selId}" class="bg-[#2f8fc9] text-white text-[10px] rounded px-2 py-1 w-32 outline-none border-none"><option value="${DOMPurify.sanitize(_toId)}">Move to ${_to || 'Correct Playlist'}</option></select>` +
                        `<button onclick="maintMove('${item.video_id}', '${item.current_playlist_id}', 'misplaced', '${_selId}', this)" class="bg-[#2f8fc9] text-white text-[10px] px-2 py-1 rounded">Move</button>`;
                }
                return `
                <div class="flex items-center gap-2 bg-[#20242c] p-1.5 rounded border border-[#2a2f3a] mb-2">
                    <div class="w-8 h-6 bg-gray-700 rounded overflow-hidden flex-shrink-0"><img src="${_thumb}" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='https://picsum.photos/32/24'"></div>
                    <div class="flex-1 min-w-0"><div class="text-[10px] text-white truncate">${_title}</div><div class="text-[9px] text-gray-400 truncate">${_fromTo}</div>${_dupMeta}</div>
                    ${_controls}
                </div>
                `;
            }).join('');
        }

        // POST a maintenance action to /api/maintenance/action (contract per Neo).
        // Adds Bearer auth from localStorage, matching dashboard.js apiCall pattern.
        async function maintPost(body, btn) {
            if (btn) btn.disabled = true;
            const token = localStorage.getItem('token') || '';
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            try {
                const resp = await fetch('/api/maintenance/action', { method: 'POST', headers, body: JSON.stringify(body) });
                const data = await resp.json().catch(() => ({}));
                if (data.status === 'error') {
                    toast(data.error || 'Action failed', 'error');
                } else if (body.action === 'fix_all') {
                    const _done = data.succeeded != null ? data.succeeded : (data.processed != null ? data.processed : 'all');
                    toast(`Fixed ${_done} item(s)` + (data.failed ? ` (${data.failed} failed)` : ''), 'success');
                    await loadMaintenance();
                } else {
                    toast('Action succeeded', 'success');
                    await loadMaintenance();
                }
                return data;
            } catch (e) {
                toast('Request failed: ' + e.message, 'error');
            } finally {
                if (btn && document.body.contains(btn)) btn.disabled = false;
            }
        }

        function maintKeep(vid, type, btn) {
            maintPost({ action: 'keep', type: type, video_id: vid }, btn);
        }
        function maintRemove(vid, plId, type, btn, pliId) {
            maintPost({ action: 'remove', type: type, video_id: vid, playlist_id: plId, playlist_item_id: pliId || null }, btn);
        }
        function maintMove(vid, curId, type, selId, btn) {
            const sel = document.getElementById(selId);
            const target = sel ? sel.value : null;
            maintPost({ action: 'move', type: type, video_id: vid, playlist_id: curId, target_playlist_id: target }, btn);
        }
        // Fix All / Resolve All / Apply All buttons: fix_all with the section's type.
        async function applyMaintenance(type) {
            await maintPost({ action: 'fix_all', type: type });
        }
        
        
        // DOMContentLoaded may have already fired (SPA navigation). Run init either way.
function initMaintenancePage() {
            loadMaintenance();
        }

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMaintenancePage);
} else {
    initMaintenancePage();
};
    </script>
    <script src="/static/mobile-nav.js?v=20260715e"></script>
</main>
    </div>
