services:
  - type: web
    name: tube-manager
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn tube_manager.api:api --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
    disk:
      name: tube-data
      mountPath: /app/data
      sizeGB: 1
