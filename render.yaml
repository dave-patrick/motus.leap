services:
  - type: web
    name: tube-manager
    runtime: python
    runtimeVersion: "3.11"
    plan: starter
    buildCommand: pip install --no-cache-dir --retries 10 --timeout 60 -r requirements.txt && python -m playwright install chromium chromium-headless-shell --with-deps && python -m camoufox fetch
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      # These names match what api/auth.py reads (GOOGLE_OAUTH_*).
      # YOUTUBE_* aliases are auto-mapped in code, but using the canonical
      # names directly avoids any ambiguity.
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: TUBE_MANAGER_SECRET_KEY
        generateValue: true
    autoDeploy: true
    disk:
      name: tube-data
      mountPath: /app/data
      sizeGB: 1
