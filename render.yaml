services:
  - type: web
    name: tube-manager
    runtime: python
    runtimeVersion: "3.11"
    plan: starter
    rootDir: tube-manager
    buildCommand: pip install --no-cache-dir -r reqs.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: TUBE_MANAGER_SECRET_KEY
        generateValue: true
    autoDeploy: true
    disk:
      name: tube-data
      mountPath: /app/data
      sizeGB: 1
