services:
  - type: web
    name: tube-manager
    runtime: python
    plan: starter
    rootDir: .
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
    autoDeploy: true
    disk:
      name: tube-data
      mountPath: /app/data
      sizeGB: 1
