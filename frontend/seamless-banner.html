<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>motus.leap Seamless Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'Inter', sans-serif;
    background: #0f1115; /* Base app background */
    min-height: 100vh;
  }
  .banner {
    width: 100%;
    max-width: 1920px; /* Adjust as needed for your app layout */
    height: 200px; /* Height of the provided image */
    background-color: #212121; /* Matches the background of your graphic */
    background-image: url('C:\Users\davem\OneDrive\Pictures\Screenshots 1\Screenshot 2026-06-17 193022.png');
    background-repeat: no-repeat;
    background-position: center right; /* Position the image to the right, centered vertically */
    background-size: contain; /* Scale image to fit within the banner height without cropping */
    display: flex;
    align-items: center;
    justify-content: flex-start; /* Keep any content to the left */
    padding: 0 64px;
    position: relative;
    overflow: hidden;
  }
</style>
</head>
<body>
<div class="banner">
  <!-- No separate brand icon or text here, as it's part of the background image -->
</div>
</body>
</html>
