<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>motus.leap Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0f1115; min-height: 100vh; }
  .banner {
    width: 100%;
    max-width: 1920px;
    height: 200px;
    background: linear-gradient(135deg, #0f1115 0%, #161922 50%, #0f1115 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 64px;
    position: relative;
    overflow: hidden;
  }
  .banner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
      radial-gradient(ellipse at 25% 50%, rgba(6, 182, 212, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 75% 50%, rgba(6, 182, 212, 0.06) 0%, transparent 40%);
    pointer-events: none;
  }
  .banner::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.3), transparent);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 1;
  }
  .brand-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(6, 182, 212, 0.25);
  }
  .brand-icon svg { width: 20px; height: 20px; fill: #0f1115; }
  .brand-name {
    font-size: 24px;
    font-weight: 600;
    color: #e4e4e7;
    letter-spacing: -0.02em;
  }
  .graphic {
    height: 100px;
    width: auto;
    z-index: 1;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
  }
</style>
</head>
<body>
<div class="banner">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    </div>
    <span class="brand-name">motus.leap</span>
  </div>
  <img class="graphic" src="https://v3b.fal.media/files/b/0a9f18f8/u9uvXGaMQPD_MlLnY0ia0_klSRVV2t.png" alt="motus.leap graphic">
</div>
</body>
</html>
