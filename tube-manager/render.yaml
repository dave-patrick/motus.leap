services:
  - type: web
    name: tube-manager
    runtime: python
    runtimeVersion: "3.11"
    plan: starter
    buildCommand: apt-get update && apt-get install -y --no-install-recommends libgtk-3-0t64 libnotify4 libnss3 libxss1 xdg-utils libatk-bridge2.0-0 libdrm2 libxkbcommon0 libatspi2.0-0 libxcomposite1 libxdamage1 libxext6 libxfixes3 libxrandr2 libgbm1 libxcb1 libasound2 libcups2 && pip install --no-cache-dir --retries 10 --timeout 60 -r requirements.txt && python -m playwright install chromium && python -m playwright install firefox && pip install camoufox && python -c "from camoufox.sync_api import Camofox; print('camoufox OK')"
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: TUBE_MANAGER_SECRET_KEY
        generateValue: true
    autoDeploy: true
    disk:
      name: tube-data
      mountPath: /app/data
      sizeGB: 1