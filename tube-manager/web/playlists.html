<html lang="en">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slide-out {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(100%); }

<body class="h-screen flex flex-col overflow-hidden selection:bg-blue-500/30">
    <header class="h-16 border-b border-[#2a2f3a] bg-[#16191f] flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-4"><img src="/static/logo_icon.png?v=6" class="w-8 h-8 shrink-0 object-contain"><div><h1 class="text-sm font-bold tracking-wide text-white leading-tight">mot<span class="text-[#3b82f6]">u</span>s.leap</h1></div></div>
        <div class="flex items-center gap-6"><div class="w-10 h-10 rounded-full bg-[#2a2f3a] border border-[#374151] overflow-hidden flex items-center justify-center shrink-0"><i class="fa-solid fa-user text-gray-400"></i></div><div class="flex gap-2"><button class="w-8 h-8 rounded-lg bg-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center"><i class="fa-regular fa-bell"></i></button><button onclick="logout()" class="w-8 h-8 rounded-lg bg-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center"><i class="fa-solid fa-arrow-right-from-bracket"></i></button></div></div>
    </header>
    <div class="flex flex-1 overflow-hidden">
        <aside class="w-56 border-r border-[#2a2f3a] bg-[#16191f] p-4 flex flex-col gap-1 shrink-0 overflow-y-auto">
            <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-border-all w-5 text-center"></i> Dashboard</a>
            <a href="/playlists" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-600/20 text-blue-400 text-xs font-semibold border border-blue-500/30"><i class="fa-solid fa-list w-5 text-center"></i> Playlists</a>
            <a href="/watch-later" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-regular fa-clock w-5 text-center"></i> Watch Later</a>
            <a href="/subscriptions" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-brands fa-youtube w-5 text-center"></i> Subscriptions</a>
            <a href="/maintenance" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-wrench w-5 text-center"></i> Maintenance Queue</a>
            <a href="/settings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-gear w-5 text-center"></i> Settings</a>
</aside>
        <main class="flex-1 overflow-y-auto p-6 bg-[#121419]">
            <div class="flex flex-col gap-4 min-w-[1200px]">
                
                <!-- Live System Activity Box -->
                <div id="system-activity-box" class="bento-card p-3.5 flex items-center justify-between gap-6 border border-blue-500/20 bg-[#16191f] shrink-0">
                    <div class="flex items-center gap-2.5 min-w-0">
                        <span class="relative flex h-2 w-2">
                            <span id="activity-ping-animate" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span id="activity-ping-color" class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                        </span>
                        <div class="min-w-0">
                            <div class="text-[10px] text-gray-400 uppercase tracking-wider font-bold">System Status</div>
                            <div id="activity-task-desc" class="text-xs font-semibold text-white truncate max-w-sm mt-0.5">Idle • System is ready.</div>
                        </div>
                    </div>
                    
                    <div id="activity-progress-container" class="hidden flex items-center gap-4 w-72 shrink-0">
                        <div class="flex-1">
                            <div class="flex justify-between text-[9px] font-bold font-mono text-blue-400 mb-1">
                                <span id="activity-progress-text">Progress: 0%</span>
                                <span id="activity-time-estimate">Est: ~45s</span>
                            </div>
                            <div class="w-full bg-[#20242c] h-1.5 rounded-full overflow-hidden border border-[#2a2f3a]">
                                <div id="activity-progress-bar" class="bg-blue-500 h-full rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold text-white">Playlists</h2>
                    <div class="flex gap-2">
                        <button onclick="openWatchLaterModal()" class="bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-xs font-medium px-4 py-2 rounded-lg flex items-center gap-2"><i class="fa-regular fa-clock text-blue-400"></i> View Watch Later</button>
                        <button onclick="syncPlaylists(event)" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-medium px-4 py-2 rounded-lg flex items-center gap-2"><i class="fa-solid fa-sync"></i> Sync from YouTube</button>
                        <button onclick="openNewPlaylistModal()" class="bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-xs font-medium px-4 py-2 rounded-lg flex items-center gap-2"><i class="fa-solid fa-plus"></i> New Playlist</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-7 2xl:grid-cols-8 gap-3" id="playlists-grid">
                    <div class="col-span-full bento-card p-8 text-center text-gray-400">Loading playlists...</div>
                </div>
            </div>
        </main>
    </div>
    <script>
        // Toast notification system
        function toast(message, type = 'info', duration = 4000) {
            const container = document.getElementById('toast-container') || createToastContainer();
            const toast = document.createElement('div');
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            const colors = {
                success: 'bg-green-600',
                error: 'bg-red-600',
                warning: 'bg-yellow-600',
                info: 'bg-blue-600'
            };
            toast.className = `flex items-center gap-2 px-4 py-3 rounded-lg shadow-lg text-white text-xs font-medium animate-slide-in ${colors[type] || colors.info}`;
            toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.info}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('animate-slide-out');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.id = 'toast-container';
            container.className = 'fixed top-4 right-4 z-50 flex flex-col gap-2 w-80';
            document.body.appendChild(container);
            return container;
        }

        // Store all playlists for manage function
        let allPlaylists = [];

        // Synchronous render of cached playlists for instant display
        function renderCachedPlaylists() {
            const grid = document.getElementById('playlists-grid');
            const cachedPlaylists = localStorage.getItem('cached_playlists');
            if (cachedPlaylists) {
                try {
                    const playlists = JSON.parse(cachedPlaylists);
                    if (playlists.length) {
                        allPlaylists = playlists;
                        renderPlaylistsGrid(playlists);
                        return true;
                    }
                } catch (e) {
                    console.error("Error parsing cached playlists", e);
                }
            }
            return false;
        }

        async function loadPlaylists() {
            const grid = document.getElementById('playlists-grid');
            
            // If we already rendered cached data, skip rendering again unless API returns new data
            const hasCached = renderCachedPlaylists();
            
            try {
                const response = await fetch('/api/playlists');
                if (!response.ok) throw new Error('Failed to load');
                const data = await response.json();
                allPlaylists = data.playlists || [];
                
                // Save to localStorage
                localStorage.setItem('cached_playlists', JSON.stringify(allPlaylists));
                
                // Always re-render with fresh data
                renderPlaylistsGrid(allPlaylists);
            } catch (e) {
                if (!hasCached) {
                    grid.innerHTML = '<div class="col-span-full bento-card p-8 text-center text-red-400">Failed to load playlists</div>';
                }
            }
        }

        function renderPlaylistsGrid(playlists) {
            const grid = document.getElementById('playlists-grid');
            if (!playlists.length) {
                grid.innerHTML = '<div class="col-span-full bento-card p-12 text-center text-gray-400">No playlists found. Create one to get started.</div>';
                return;
            }
            grid.innerHTML = playlists.map(p => `
                <div onclick="window.location.href='/playlist/${p.id}'" class="bento-card p-3 flex flex-col cursor-pointer hover:border-blue-500/50 transition-colors h-full relative">
                    <div class="flex items-start justify-between mb-2">
                        <div class="w-12 h-7 bg-gray-700 rounded overflow-hidden flex-shrink-0"><img src="${p.thumbnail || 'https://picsum.photos/160/90'}" class="w-full h-full object-cover"></div>
                        <button onclick="openPlaylist('${p.id}', event)" class="text-[9px] px-1.5 py-0.5 rounded bg-[#20242c] text-gray-400 border border-[#2a2f3a] hover:text-white hover:border-[#374151] transition-colors" title="Open on YouTube"><i class="fa-solid fa-external-link text-[8px] mr-1"></i> YouTube</button>
                    </div>
                    <h3 class="text-xs font-semibold text-white truncate mb-0.5">${p.title}</h3>
                    <p class="text-[9px] text-gray-400 mb-2">${p.video_count} videos</p>
                    <div class="flex items-center gap-1 mt-auto pt-1.5 border-t border-[#2a2f3a]" onclick="event.stopPropagation()">
                        <button onclick="rescanPlaylist('${p.id}', event)" class="bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-[10px] py-1 px-2.5 rounded transition-colors" title="Rescan Videos"><i class="fa-solid fa-arrows-rotate text-[9px]"></i></button>
                        <button onclick="openManagePlaylistModal('${p.id}', \`${p.title.replace(/'/g, "\\'")}\`, event)" class="flex-1 bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-[10px] py-1 rounded transition-colors"><i class="fa-solid fa-cog text-[9px]"></i> Manage</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Open playlist on YouTube
        function openPlaylist(playlistId, event) {
            if (event) event.stopPropagation();
            window.open(`https://www.youtube.com/playlist?list=${playlistId}`, '_blank');
        }

        async function rescanPlaylist(playlistId, event) {
            event.stopPropagation();
            const btn = event.currentTarget;
            const origHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-blue-400"></i>';
            
            toast('Rescanning playlist videos...', 'info');
            try {
                const resp = await fetch(`/api/youtube/videos?playlist_id=${playlistId}&force_refresh=true`);
                if (!resp.ok) throw new Error('Failed to refresh');
                const data = await resp.json();
                const count = data.videos?.length || 0;
                toast(`Rescan complete - ${count} videos found`, 'success');
                loadPlaylists();
            } catch (e) {
                toast('Rescan failed', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = origHTML;
            }
        }

        function closeAllMenus() {
            document.querySelectorAll('[id^="menu-"]').forEach(el => el.classList.add('hidden'));
        }

        function togglePlaylistMenu(playlistId) {
            const menu = document.getElementById(`menu-${playlistId}`);
            if (!menu) return;
            document.querySelectorAll('[id^="menu-"]').forEach(el => {
                if (el !== menu) el.classList.add('hidden');
            });
            menu.classList.toggle('hidden');
        }

        async function renamePlaylistPrompt(playlistId) {
            const current = allPlaylists.find(p => p.id === playlistId);
            const newTitle = prompt('Rename playlist', current ? current.title : '');
            if (newTitle === null || !newTitle.trim()) return;
            try {
                const resp = await fetch('/api/youtube/playlists/rename', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({playlist_id: playlistId, new_title: newTitle.trim()})
                });
                const data = await resp.json();
                toast(data.message || data.error, data.status === 'success' ? 'success' : 'error');
                closeAllMenus();
                loadPlaylists();
            } catch (e) {
                toast('Rename failed', 'error');
            }
        }

        async function duplicatePlaylistPrompt(playlistId) {
            const current = allPlaylists.find(p => p.id === playlistId);
            const newTitle = prompt(`Duplicate playlist: ${current ? current.title : ''}`, `${current ? current.title : 'Playlist'} (copy)`);
            if (newTitle === null || !newTitle.trim()) return;
            try {
                const resp = await fetch('/api/youtube/playlists/duplicate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({playlist_id: playlistId, new_title: newTitle.trim()})
                });
                const data = await resp.json();
                toast(data.message || data.error, data.status === 'success' ? 'success' : 'error');
                closeAllMenus();
                loadPlaylists();
            } catch (e) {
                toast('Duplicate failed', 'error');
            }
        }

        async function deletePlaylistConfirmed(playlistId) {
            if (!confirm('Delete this playlist? This cannot be undone.')) return;
            try {
                const resp = await fetch('/api/youtube/playlists/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({playlist_id: playlistId})
                });
                const data = await resp.json();
                toast(data.message || data.error, data.status === 'success' ? 'success' : 'error');
                closeAllMenus();
                loadPlaylists();
            } catch (e) {
                toast('Delete failed', 'error');
            }
        }

        async function addVideoToPlaylist(playlistId, videoId) {
            const id = prompt('Video ID');
            if (!id) return;
            await fetch('/youtube/actions/add', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({playlist_id: playlistId, video_id: id})
            });
            toast('Video queued', 'success');
        }

        async function editPlaylist(playlistId) {
            const title = prompt('Playlist title');
            if (title === null) return;
            await fetch('/youtube/actions/create-playlist', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({title})
            });
            toast('Playlist updated', 'success');
            loadPlaylists();
        }

        async function deletePlaylist(playlistId) {
            if (!confirm('Delete this playlist?')) return;
            await fetch('/youtube/actions/remove', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({playlist_item_id: playlistId})
            });
            toast('Playlist delete requested', 'success');
            loadPlaylists();
        }

        function managePlaylist(playlistId) {
            window.location.href = `/playlist/${playlistId}`;
        }

        function openManagePlaylistModal(playlistId, playlistTitle, event) {
            if (event) event.stopPropagation();
            
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-xs';
            modal.innerHTML = `
                <div class="bg-[#1a1d24] border border-[#2a2f3a] rounded-xl p-5 w-full max-w-sm mx-4 shadow-2xl" onclick="event.stopPropagation()">
                    <div class="flex items-center justify-between mb-4">
                        <div class="min-w-0">
                            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Manage Playlist</h3>
                            <p class="text-sm font-bold text-white truncate">${playlistTitle}</p>
                        </div>
                        <button onclick="this.closest('.fixed').remove()" class="text-gray-400 hover:text-white p-1 transition-colors"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    
                    <div class="space-y-2.5">
                        <button onclick="actionRenamePlaylist('${playlistId}', \`${playlistTitle.replace(/'/g, "\\'")}\`); this.closest('.fixed').remove()" class="w-full bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-200 text-xs font-semibold py-2.5 rounded-lg flex items-center gap-2.5 px-4 transition-colors">
                            <i class="fa-solid fa-pen-to-square text-blue-400 w-4 text-center"></i> Rename Playlist
                        </button>
                        <button onclick="actionDuplicatePlaylist('${playlistId}', \`${playlistTitle.replace(/'/g, "\\'")}\`); this.closest('.fixed').remove()" class="w-full bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-200 text-xs font-semibold py-2.5 rounded-lg flex items-center gap-2.5 px-4 transition-colors">
                            <i class="fa-solid fa-copy text-green-400 w-4 text-center"></i> Duplicate Playlist
                        </button>
                        <button onclick="actionDeletePlaylist('${playlistId}', \`${playlistTitle.replace(/'/g, "\\'")}\`); this.closest('.fixed').remove()" class="w-full bg-red-950/20 hover:bg-red-900/30 border border-red-900/30 text-red-200 text-xs font-semibold py-2.5 rounded-lg flex items-center gap-2.5 px-4 transition-colors">
                            <i class="fa-solid fa-trash-can text-red-500 w-4 text-center"></i> Delete Playlist
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        async function actionRenamePlaylist(playlistId, currentTitle) {
            const newTitle = prompt('Rename Playlist - Enter new title:', currentTitle);
            if (!newTitle || newTitle === currentTitle) return;
            
            toast('Renaming playlist...', 'info');
            try {
                const resp = await fetch('/api/youtube/playlists/rename', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ playlist_id: playlistId, new_title: newTitle })
                });
                const res = await resp.json();
                if (resp.ok) {
                    toast(res.message, 'success');
                    loadPlaylists();
                } else {
                    toast(res.detail || 'Rename failed', 'error');
                }
            } catch (e) {
                toast('Failed to rename playlist', 'error');
            }
        }

        async function actionDuplicatePlaylist(playlistId, currentTitle) {
            const newTitle = prompt('Duplicate Playlist - Enter name for duplicate:', `${currentTitle} Copy`);
            if (!newTitle) return;
            
            toast('Initiating playlist duplication...', 'info');
            try {
                const resp = await fetch('/api/youtube/playlists/duplicate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ playlist_id: playlistId, new_title: newTitle })
                });
                const res = await resp.json();
                if (resp.ok) {
                    toast(res.message, 'success');
                    loadPlaylists();
                } else {
                    toast(res.detail || 'Duplication failed', 'error');
                }
            } catch (e) {
                toast('Failed to duplicate playlist', 'error');
            }
        }

        async function actionDeletePlaylist(playlistId, title) {
            if (!confirm(`Are you absolutely sure you want to delete '${title}' from YouTube?\n\nThis action cannot be undone.`)) return;
            
            toast('Deleting playlist...', 'info');
            try {
                const resp = await fetch('/api/youtube/playlists/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ playlist_id: playlistId })
                });
                const res = await resp.json();
                if (resp.ok) {
                    toast(res.message, 'success');
                    loadPlaylists();
                } else {
                    toast(res.detail || 'Delete failed', 'error');
                }
            } catch (e) {
                toast('Failed to delete playlist', 'error');
            }
        }
        
        // Create new playlist modal
        function openNewPlaylistModal() {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black/50';
            modal.innerHTML = `
                <div class="bg-[#1a1d24] border border-[#2a2f3a] rounded-lg p-6 w-full max-w-md mx-4">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold text-white">Create New Playlist</h3>
                        <button onclick="this.closest('.fixed').remove()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] text-gray-400 mb-1 block">Title</label>
                            <input type="text" id="new-playlist-title" placeholder="My Playlist" class="w-full bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-xs rounded px-3 py-2 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-400 mb-1 block">Description</label>
                            <textarea id="new-playlist-desc" placeholder="Playlist description..." class="w-full bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-xs rounded px-3 py-2 outline-none" rows="3"></textarea>
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-400 mb-1 block">Privacy</label>
                            <select id="new-playlist-privacy" class="w-full bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-xs rounded px-3 py-2 outline-none">
                                <option value="private">Private</option>
                                <option value="unlisted">Unlisted</option>
                                <option value="public">Public</option>
                            </select>
                        </div>
                        <div class="flex gap-2 pt-2">
                            <button onclick="createPlaylist(); this.closest('.fixed').remove()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white text-xs py-2 rounded">Create</button>
                            <button onclick="this.closest('.fixed').remove()" class="flex-1 bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-xs py-2 rounded">Cancel</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        async function createPlaylist() {
            const title = document.getElementById('new-playlist-title').value;
            const description = document.getElementById('new-playlist-desc').value;
            const privacy = document.getElementById('new-playlist-privacy').value;
            
            if (!title) {
                toast('Title is required', 'error');
                return;
            }
            
            try {
                const resp = await fetch('/youtube/actions/create-playlist', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({title, description, privacy})
                });
                const result = await resp.json();
                toast(`Playlist created: ${result.title || 'New playlist'}`, 'success');
                loadPlaylists();
            } catch (e) {
                toast('Failed to create playlist', 'error');
            }
        }
        
        async function syncPlaylists(e) {
            const btn = e.target.closest('button') || e.target;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Syncing...';
            try {
                const resp = await fetch('/api/action', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'sync_playlists'})
                });
                const result = await resp.json();
                if (result.error) {
                    toast(`Sync failed: ${result.error}`, 'error');
                } else {
                    toast(`Sync queued: ${result.action}`, 'success');
                    loadPlaylists();
                }
            } catch (err) {
                toast('Failed to queue sync', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-sync"></i> Sync from YouTube';
            }
        }
        
        // Watch Later modal with multi-select and move capability
        async function openWatchLaterModal() {
            // Load playlists for the target dropdown first
            let targetPlaylists = [];
            try {
                const plResp = await fetch('/api/playlists');
                if (plResp.ok) {
                    const plData = await plResp.json();
                    targetPlaylists = plData.playlists || [];
                }
            } catch (e) {}
            
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black/70';
            overlay.innerHTML = `
                <div class="bento-card w-[750px] max-h-[85vh] flex flex-col overflow-hidden">
                    <div class="flex items-center justify-between px-4 py-3 border-b border-[#2a2f3a] shrink-0">
                        <h3 class="text-sm font-bold text-white"><i class="fa-regular fa-clock text-blue-400 mr-2"></i>Watch Later Queue</h3>
                        <button onclick="this.closest('.fixed').remove()" class="text-gray-400 hover:text-white p-1 rounded hover:bg-[#2a2f3a] transition-colors"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div id="wl-content" class="flex-1 overflow-y-auto p-4 text-xs text-gray-400 text-center py-12"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Loading Watch Later...</div>
                    <div id="wl-toolbar" class="hidden px-4 py-3 border-t border-[#2a2f3a] bg-[#16191f] shrink-0 flex items-center gap-3">
                        <label class="flex items-center gap-2 text-[10px] text-gray-400 cursor-pointer select-none">
                            <input type="checkbox" id="wl-select-all" class="accent-blue-500" onchange="toggleAllWatchLater(this.checked)">
                            Select All
                        </label>
                        <span id="wl-selected-count" class="text-[10px] text-gray-500">0 selected</span>
                        <div class="flex-1"></div>
                        <select id="wl-target-playlist" class="bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-[10px] rounded px-2 py-1.5 outline-none w-48">
                            <option value="">-- Select target playlist --</option>
                            ${targetPlaylists.map(p => `<option value="${p.id}">${p.title} (${p.video_count})</option>`).join('')}
                        </select>
                        <button id="wl-move-btn" onclick="moveSelectedWatchLater()" disabled class="bg-blue-600/50 text-white/50 text-[10px] font-medium px-3 py-1.5 rounded flex items-center gap-1.5 cursor-not-allowed">
                            <i class="fa-solid fa-arrow-right"></i> Move (0)
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            
            const content = document.getElementById('wl-content');
            try {
                const resp = await fetch('/api/watch-later');
                const data = await resp.json();
                const items = data.items || [];
                const source = data.source || 'none';
                
                if (!items.length) {
                    content.innerHTML = `<div class="py-8 text-gray-400">
                        <i class="fa-regular fa-clock text-4xl mb-4 block text-gray-600"></i>
                        <p>No videos in your Watch Later queue.</p>
                        <p class="text-[10px] text-gray-500 mt-1">Source: ${source}</p>
                    </div>`;
                    return;
                }
                
                // Build video rows with checkboxes
                content.innerHTML = `
                    <div class="text-[10px] text-gray-500 mb-2 px-1">${items.length} videos • source: ${source}</div>
                    <div id="wl-video-list">
                        ${items.map((item, i) => {
                            const vid = item.contentDetails?.videoId || item.id || '';
                            const snippet = item.snippet || {};
                            const title = snippet.title || 'Unknown';
                            const channel = snippet.videoOwnerChannelTitle || '';
                            const thumb = `https://i.ytimg.com/vi/${vid}/default.jpg`;
                            return `
                                <div class="wl-row flex items-center gap-3 p-2 hover:bg-[#20242c] rounded transition-colors border-b border-[#2a2f3a]/30" data-video-id="${vid}">
                                    <input type="checkbox" class="wl-cb accent-blue-500 shrink-0" onchange="updateWatchLaterUI()">
                                    <img src="${thumb}" class="w-16 h-9 rounded object-cover shrink-0">
                                    <div class="flex-1 min-w-0">
                                        <div class="text-xs font-medium text-white truncate">${title}</div>
                                        ${channel ? '<div class="text-[10px] text-gray-400 truncate">' + channel + '</div>' : ''}
                                    </div>
                                    <a href="https://youtube.com/watch?v=${vid}" target="_blank" class="text-gray-400 hover:text-white p-1 rounded hover:bg-[#2a2f3a] transition-colors shrink-0" title="Watch on YouTube"><i class="fa-solid fa-external-link text-[10px]"></i></a>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                
                // Show the toolbar
                document.getElementById('wl-toolbar').classList.remove('hidden');
            } catch (e) {
                content.innerHTML = `<div class="py-8 text-red-400">Failed to load: ${e.message}</div>`;
            }
        }

        function toggleAllWatchLater(checked) {
            document.querySelectorAll('.wl-cb').forEach(cb => cb.checked = checked);
            updateWatchLaterUI();
        }

        function updateWatchLaterUI() {
            const checkboxes = document.querySelectorAll('.wl-cb:checked');
            const count = checkboxes.length;
            document.getElementById('wl-selected-count').textContent = count + ' selected';
            
            const btn = document.getElementById('wl-move-btn');
            const playlist = document.getElementById('wl-target-playlist');
            if (count > 0 && playlist && playlist.value) {
                btn.disabled = false;
                btn.className = 'bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-medium px-3 py-1.5 rounded flex items-center gap-1.5 cursor-pointer';
                btn.innerHTML = '<i class="fa-solid fa-arrow-right"></i> Move (' + count + ')';
            } else {
                btn.disabled = true;
                btn.className = 'bg-blue-600/50 text-white/50 text-[10px] font-medium px-3 py-1.5 rounded flex items-center gap-1.5 cursor-not-allowed';
                btn.innerHTML = '<i class="fa-solid fa-arrow-right"></i> Move (' + count + ')';
            }
        }

        // Listen for playlist dropdown changes
        document.addEventListener('change', function(e) {
            if (e.target && e.target.id === 'wl-target-playlist') {
                updateWatchLaterUI();
            }
        });

        async function moveSelectedWatchLater() {
            const btn = document.getElementById('wl-move-btn');
            const playlist = document.getElementById('wl-target-playlist');
            if (!playlist || !playlist.value) {
                toast('Select a target playlist first', 'warning');
                return;
            }
            
            const videoIds = [];
            document.querySelectorAll('.wl-cb:checked').forEach(cb => {
                const row = cb.closest('.wl-row');
                if (row) videoIds.push(row.dataset.videoId);
            });
            
            if (!videoIds.length) {
                toast('No videos selected', 'warning');
                return;
            }
            
            btn.disabled = true;
            const origHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Moving...';
            
            try {
                const resp = await fetch('/api/watch-later/move', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({video_ids: videoIds, target_playlist_id: playlist.value})
                });
                const data = await resp.json();
                const moved = data.moved?.length || 0;
                const failed = data.failed?.length || 0;
                
                // Record moves for AI training memory
                if (moved > 0) {
                    const targetName = playlist.options[playlist.selectedIndex]?.text || playlist.value;
                    const selectedRows = document.querySelectorAll('.wl-cb:checked');
                    selectedRows.forEach(cb => {
                        const row = cb.closest('.wl-row');
                        if (row) {
                            const vid = row.dataset.videoId;
                            const title = row.querySelector('.text-xs.font-medium')?.textContent || '';
                            const channel = row.querySelector('.text-[10px].text-gray-400')?.textContent || '';
                            fetch('/api/ai/record-move', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({
                                    video_id: vid,
                                    title: title,
                                    channel_title: channel,
                                    to_playlist_name: targetName,
                                    to_playlist_id: playlist.value,
                                    source: 'manual'
                                })
                            }).catch(() => {});
                        }
                    });
                }
                
                // Remove moved rows from UI
                document.querySelectorAll('.wl-cb:checked').forEach(cb => {
                    const row = cb.closest('.wl-row');
                    if (row) row.remove();
                });
                
                if (failed > 0) {
                    toast(`Moved ${moved} video(s), ${failed} failed`, 'warning');
                } else {
                    toast(`Successfully moved ${moved} video(s)`, 'success');
                }
                
                updateWatchLaterUI();
            } catch (e) {
                toast('Move failed: ' + e.message, 'error');
                btn.disabled = false;
                btn.innerHTML = origHTML;
            }
        }
        
        // Load scan status in header
        async function loadDashboardStats() {
            try {
                const response = await fetch('/api/stats');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('last-scan').textContent = data.last_scan || 'Never';
                    const statusLabel = document.getElementById('status-label');
                    if (statusLabel) {
                        if (data.running_tasks > 0 && data.current_task) {
                            statusLabel.innerHTML = `<span class="text-yellow-400 font-bold animate-pulse">● ${data.current_task}</span>`;
                        } else {
                            statusLabel.innerHTML = `<span class="text-green-400 font-bold">● Idle</span>`;
                        }
                    }
                }
            } catch (e) {
                console.log('Stats endpoint not available');
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboardStats();
            loadPlaylists();
            setInterval(loadDashboardStats, 30000);
        });
    </script>
</body>
</html>
