    <script>
    function openCreatePlaylistModal() { document.getElementById('create-playlist-modal').classList.remove('hidden'); }
    function closeCreatePlaylistModal() { document.getElementById('create-playlist-modal').classList.add('hidden'); }
    async function submitCreatePlaylist() {
        const title = document.getElementById('cp-title').value.trim();
        const description = document.getElementById('cp-desc').value.trim();
        const privacy = document.getElementById('cp-privacy').value;
        if (!title) return alert('Title is required');
        const resp = await fetch('/api/youtube/playlists/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, description, privacy })
        });
        if (!resp.ok) return alert('Failed to create playlist');
        closeCreatePlaylistModal();
        loadPlaylists();
    }
    </script>
