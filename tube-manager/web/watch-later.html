<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <title>Watch Later • motus.leap</title>
    <link rel="icon" type="image/png" href="/static/favicon.png?v=7">
    <link rel="apple-touch-icon" href="/static/logo_icon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/auth-check.js?v=7"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        body { font-family: 'Inter', sans-serif; background-color: #0e1014; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
        .bento-card { background: #181c24; border: 1px solid #2a2f3a; border-radius: 0.75rem; }
        .bento-card-dark { background: #0e1014; border: 1px solid #2a2f3a; border-radius: 0.75rem; }
        input[type="text"], input[type="password"], input[type="number"], select, textarea { min-height: 44px; }
    
        @font-face {
            font-family: 'Mokoto';
            src: url('/static/Mokoto.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        .site-title { font-family: 'Mokoto', serif; }
</style>
</head>
<div id="mobile-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden" onclick="closeMobileSidebar()"></div>
<button id="sidebar-toggle" onclick="openMobileSidebar()" class="fixed top-3 left-3 z-30 md:hidden inline-flex items-center justify-center w-11 h-11 rounded-lg bg-[#1a1d24] border border-[#2a2f3a] text-gray-300" aria-label="Open menu"><i class="fas fa-bars"></i></button>
<body class="bg-[#0e1014] min-h-screen flex selection:bg-[#2f8fc9]/30">
    <!-- Sidebar (standardized to match other pages) -->
    <aside id="mobile-sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-[#1a1d24] p-3 flex flex-col border-r border-[#2a2f3a] transform -translate-x-full md:translate-x-0 transition-transform duration-200 overflow-y-auto md:relative md:z-auto">
        <nav class="flex flex-col gap-1">
            <a href="/dashboard" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 text-sm transition-colors duration-200"><i class="fas fa-th-large w-5 text-center"></i> Dashboard</a>
            <a href="/playlists" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 text-sm transition-colors duration-200"><i class="fas fa-list-ul w-5 text-center"></i> Playlists</a>
            <a href="/watch-later" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-lg font-semibold text-sm transition-colors duration-200"><i class="fa-regular fa-clock w-5 text-center text-[#2f8fc9]"></i> Watch Later</a>
            <a href="/subscriptions" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 text-sm transition-colors duration-200"><i class="fab fa-youtube w-5 text-center"></i> Subscriptions</a>
            <a href="/maintenance" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 text-sm transition-colors duration-200"><i class="fas fa-wrench w-5 text-center"></i> Maintenance Queue</a>
        </nav>
        <div class="mt-auto pt-2 border-t border-[#2a2f3a]">
            <a href="/settings" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 text-sm transition-colors duration-200"><i class="fas fa-cog w-5 text-center"></i> Settings</a>
        </div>
    </aside>

    <!-- Main Content with header -->
    <div class="flex flex-col flex-1 min-h-screen">
    <header class="h-16 border-b border-[#2a2f3a] bg-[#1a1d24] flex items-center justify-between px-4 md:px-6 shrink-0">
        <div class="flex items-center gap-3">
            <img src="/static/logo_icon.png?v=3" alt="motus.leap" class="w-8 h-8 object-contain">
            <h1 class="text-xl md:text-3xl font-semibold text-white tracking-tight site-title">mot<span class="text-[#2f8fc9]">u</span><span class="text-white">s</span><span class="text-gray-500">.</span>leap</h1>
        </div>
        <button onclick="logout()" class="w-11 h-11 rounded-lg bg-[#1a1d24] border border-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center transition-colors" title="Logout" aria-label="Logout"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6">
        <div class="max-w-6xl mx-auto space-y-4">
            <!-- Header -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-2 gap-3">
                <div>
                    <h2 class="text-lg md:text-xl font-bold text-white"><i class="fa-regular fa-clock text-[#2f8fc9] mr-2"></i>Watch Later</h2>
                </div>
                <div class="flex flex-wrap gap-2">
                    <button id="btn-sync" onclick="watchLaterSync()" class="bg-[#2f8fc9] hover:bg-[#2a7db8] text-white text-xs font-medium px-4 py-2.5 rounded-lg flex items-center gap-2 transition-colors">
                        <i class="fa-solid fa-rotate"></i> Watch Later Sync
                    </button>
                    <button id="btn-apply" onclick="applyMoves()" disabled class="bg-[#2f8fc9]/40 text-white/40 text-xs font-medium px-4 py-2.5 rounded-lg flex items-center gap-2 cursor-not-allowed transition-colors">
                        <i class="fa-solid fa-check-double"></i> Apply All (<span id="apply-count">0</span>)
                    </button>
                </div>
            </div>

            <!-- AI Plan Display -->
            <div id="ai-plan-container" class="hidden space-y-2">
                <div class="bento-card p-4 flex items-center justify-between">
                    <span class="text-[10px] text-gray-400"><i class="fa-solid fa-robot text-[#2f8fc9] mr-1.5"></i> <span id="plan-stats">Loading...</span></span>
                    <div class="flex gap-2">
                        <button onclick="selectAllPlans()" class="text-[9px] px-2 py-0.5 rounded bg-[#20242c] border border-[#2a2f3a] text-gray-300 hover:text-white hover:border-[#374151] transition-colors">Select All</button>
                        <button onclick="expandAllPlans()" class="text-[9px] px-2 py-0.5 rounded bg-[#20242c] border border-[#2a2f3a] text-gray-300 hover:text-white hover:border-[#374151] transition-colors"><i class="fa-solid fa-chevron-down text-[8px] mr-1"></i>Expand All</button>
                    </div>
                </div>
                <div id="ai-plan-list" class="space-y-2"></div>
            </div>

            <!-- Empty state -->
            <div id="empty-state" class="bento-card p-12 text-center">
                <i class="fa-regular fa-clock text-6xl mb-6 block text-gray-700"></i>
                <p class="text-gray-400 text-sm font-medium mb-2">No Watch Later videos loaded</p>
                <p class="text-[10px] text-gray-500 mb-4">Click <strong class="text-[#2f8fc9]">Watch Later Sync</strong> to sync your queue.</p>
            </div>

            <!-- Log -->
            <div id="wl-log" class="hidden bento-card p-4 font-mono text-[9px] text-gray-400 max-h-32 overflow-y-auto"></div>
        </div>
    </main>
</div>
    <script>
        let cachedVideos = [];
        let aiPlans = [];
        let targetPlaylists = [];
        let selectedPlans = new Set();

        function log(msg) {
            const el = document.getElementById('wl-log');
            if (el) {
                el.classList.remove('hidden');
                const line = document.createElement('div');
                line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
                el.appendChild(line);
                while (el.children.length > 50) el.removeChild(el.firstChild);
                el.scrollTop = el.scrollHeight;
            }
        }

        function toast(msg, type='info') {
            let c = document.getElementById('toast-container');
            if (!c) { c = document.createElement('div'); c.id = 'toast-container'; c.className = 'fixed top-4 right-4 z-50 flex flex-col gap-2 w-80'; document.body.appendChild(c); }
            const el = document.createElement('div');
            const icons = { success: 'fa-check-circle', error: 'fa-times-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
            const colors = { success: 'bg-green-600', error: 'bg-red-600', warning: 'bg-yellow-600', info: 'bg-[#2f8fc9]' };
            el.className = 'flex items-center gap-2 px-4 py-3 rounded-lg shadow-lg text-white text-xs font-medium ' + (colors[type] || colors.info);
            el.innerHTML = '<i class="fa-solid ' + (icons[type] || icons.info) + '"></i><span>' + msg + '</span>';
            c.appendChild(el);
            setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 4000);
        }

        async function fetchWatchLaterRaw() {
            log('Fetching Watch Later videos...');
            document.getElementById('empty-state').innerHTML = '<div class="py-8"><i class="fa-solid fa-spinner fa-spin text-[#2f8fc9] text-2xl mb-3"></i><p class="text-gray-400 text-xs">Loading queue...</p></div>';
            try {
                const resp = await fetch('/api/watch-later');
                const data = await resp.json();

                if (!resp.ok) {
                    throw new Error(data.error || 'Failed to fetch Watch Later videos');
                }

                // Check for API error even on 200 response
                if (data.error) {
                    throw new Error(data.error);
                }

                cachedVideos = data.items || [];
                log('Loaded ' + cachedVideos.length + ' videos from ' + data.source);
                if (cachedVideos.length > 0) {
                    document.getElementById('empty-state').innerHTML = '<div class="py-8"><i class="fa-solid fa-check-circle text-green-400 text-2xl mb-3"></i><p class="text-gray-300 text-xs">' + cachedVideos.length + ' videos ready</p><p class="text-[10px] text-gray-500 mt-1">Click <strong class="text-[#2f8fc9]">Watch Later Sync</strong> to classify and move.</p></div>';
                } else {
                    document.getElementById('empty-state').innerHTML = '<div class="py-8"><i class="fa-regular fa-clock text-6xl mb-6 block text-gray-700"></i><p class="text-gray-400 text-sm font-medium mb-2">Your Watch Later queue is empty!</p><p class="text-[10px] text-gray-500 mb-4">Add some videos to Watch Later on YouTube, then click <strong class="text-[#2f8fc9]">Watch Later Sync</strong>.</p></div>';
                }
            } catch(e) {
                log('ERROR: ' + e.message);
                document.getElementById('empty-state').innerHTML = `<div class="py-8 text-red-400 text-xs">Failed to load: ${DOMPurify.sanitize(e.message || 'Network error')}</div>`;
                toast(`Failed to load Watch Later: ${DOMPurify.sanitize(e.message || 'Network error')}`, 'error');
            }
        }

        async function watchLaterSync() {
            if (!cachedVideos.length) {
                log('No videos loaded. Fetching first...');
                await fetchWatchLaterRaw();
                if (!cachedVideos.length) return;
            }

            // Load playlists for target dropdown
            try {
                const plResp = await fetch('/api/playlists/names');
                if (plResp.ok) {
                    const plData = await plResp.json();
                    targetPlaylists = plData.playlists || [];
                }
            } catch(e) {}

            document.getElementById('btn-sync').disabled = true;
            document.getElementById('btn-sync').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Syncing...';
            log('Running AI classification on ' + cachedVideos.length + ' videos...');

            try {
                const videoIds = cachedVideos.map(v => v.contentDetails?.videoId || v.id || '').filter(Boolean);
                // Build metadata inline to avoid YouTube API calls on the backend
                const metadata = cachedVideos.map(v => ({
                    video_id: v.contentDetails?.videoId || v.id || '',
                    title: v.snippet?.title || '',
                    channel: v.snippet?.videoOwnerChannelTitle || '',
                    description: v.snippet?.description || '',
                })).filter(m => m.video_id);
                const resp = await fetch('/api/ai/classify', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        video_ids: videoIds.slice(0, 50),
                        metadata: metadata.slice(0, 50),
                        playlist_names: targetPlaylists.map(p => ({id: p.id, title: p.title}))
                    })
                });
                const data = await resp.json();
                const results = data.results || [];

                aiPlans = results.map((r, i) => ({
                    ...r,
                    video_id: r.video_id,
                    title: r.title || cachedVideos[i]?.snippet?.title || 'Unknown',
                    channel: r.channel || cachedVideos[i]?.snippet?.videoOwnerChannelTitle || '',
                    suggested: r.matched_playlist,
                    corrected_playlist: null,
                    expanded: false,
                }));

                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('ai-plan-container').classList.remove('hidden');
                renderPlanList();
                log('AI classified ' + aiPlans.length + ' videos');

                const assigned = aiPlans.filter(p => p.suggested).length;
                document.getElementById('plan-stats').textContent = assigned + ' assigned, ' + (aiPlans.length - assigned) + ' unsure (select target manually)';
            } catch(e) {
                log('ERROR: ' + e.message);
                toast(`AI scan failed: ${DOMPurify.sanitize(e.message || 'Network error')}`, 'error');
            } finally {
                document.getElementById('btn-sync').disabled = false;
                document.getElementById('btn-sync').innerHTML = '<i class="fa-solid fa-rotate"></i> Watch Later Sync';
            }
        }

        function renderPlanList() {
            const list = document.getElementById('ai-plan-list');
            selectedPlans = new Set(aiPlans.filter(p => p.suggested || p.corrected_playlist).map(p => p.video_id));
            updateApplyButton();

            list.innerHTML = aiPlans.map((plan, i) => {
                const vid = plan.video_id;
                const thumb = 'https://i.ytimg.com/vi/' + vid + '/default.jpg';
                const suggested = plan.suggested || '';
                const corrected = plan.corrected_playlist;
                const displayPlaylist = corrected || suggested;
                const hasAI = !!suggested;
                const selected = selectedPlans.has(vid);

                return '<div class="bento-card p-4 hover:border-[#2a7db8]/30 transition-colors" data-vid="' + vid + '">' +
                    '<div class="flex flex-wrap items-center gap-2 sm:gap-3">' +
                        '<input type="checkbox" class="plan-cb accent-[#2f8fc9] shrink-0 w-6 h-6" ' + (selected ? 'checked' : '') + ' onchange="togglePlan(this, \\'' + vid + '\\')">' +
                        '<img src="' + thumb + '" class="w-20 h-12 sm:w-24 sm:h-14 rounded object-cover shrink-0 loading="lazy"">' +
                        '<div class="flex-1 min-w-0">' +
                            '<div class="text-[11px] font-medium text-white truncate">' + (plan.title || 'Unknown') + '</div>' +
                            '<div class="text-[9px] text-gray-400 truncate">' + (plan.channel || '') + '</div>' +
                            '<div class="flex flex-wrap items-center gap-1 mt-1">' +
                                (hasAI ? '<span class="text-[8px] px-1.5 py-0.5 rounded bg-[#2f8fc9]/20 text-[#2f8fc9] border border-[#2f8fc9]/20 inline-block"><i class="fa-solid fa-robot text-[7px] mr-0.5"></i>' + suggested + '</span>' : '<span class="text-[8px] px-1.5 py-0.5 rounded bg-gray-700/50 text-gray-500 border border-gray-600/20 inline-block">unsure</span>') +
                                (corrected ? '<span class="text-[8px] px-1.5 py-0.5 rounded bg-green-600/20 text-green-400 border border-green-500/20 inline-block"><i class="fa-solid fa-pen-to-square text-[7px] mr-0.5"></i>' + corrected + '</span>' : '') +
                            '</div>' +
                        '</div>' +
                        '<select class="plan-target bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-[9px] rounded px-1.5 py-1 outline-none w-full sm:w-32 ml-2" onchange="correctPlan(this, \\'' + vid + '\\')">' +
                            '<option value="">-- Pick --</option>' +
                            targetPlaylists.map(p => '<option value="' + p.id + '" ' + (displayPlaylist === p.title ? 'selected' : '') + '>' + p.title + '</option>').join('') +
                        '</select>' +
                        '<a href="https://youtube.com/watch?v=' + vid + '" target="_blank" class="text-gray-400 hover:text-white p-2 rounded hover:bg-[#2a2f3a] transition-colors shrink-0" title="Watch"><i class="fa-solid fa-play text-sm"></i></a>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function togglePlan(cb, vid) {
            if (cb.checked) selectedPlans.add(vid); else selectedPlans.delete(vid);
            updateApplyButton();
        }

        function correctPlan(select, vid) {
            const plan = aiPlans.find(p => p.video_id === vid);
            if (!plan) return;
            const opt = select.options[select.selectedIndex];
            const targetId = select.value;
            const targetName = opt.text;
            plan.corrected_playlist = targetId ? targetName : null;
            plan.corrected_playlist_id = targetId || null;
            plan.corrected_playlist_name = targetName || null;
            selectedPlans.add(vid);
            renderPlanList();
            // Record correction for AI learning
            if (targetId && targetName) {
                fetch('/api/ai/record-move', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        video_id: vid,
                        title: plan.title,
                        channel_title: plan.channel,
                        to_playlist_name: targetName,
                        to_playlist_id: targetId,
                        source: 'ai_correction'
                    })
                }).catch(() => {});
                log('Corrected: ' + plan.title + ' → ' + targetName);
            }
        }

        function updateApplyButton() {
            const btn = document.getElementById('btn-apply');
            const count = document.getElementById('apply-count');
            count.textContent = selectedPlans.size;
            if (selectedPlans.size > 0) {
                btn.disabled = false;
                btn.className = 'bg-green-600 hover:bg-green-500 text-white text-xs font-medium px-5 py-2.5 rounded-lg flex items-center gap-2 transition-colors cursor-pointer';
            } else {
                btn.disabled = true;
                btn.className = 'bg-[#2f8fc9]/40 text-white/40 text-xs font-medium px-5 py-2.5 rounded-lg flex items-center gap-2 cursor-not-allowed transition-colors';
            }
        }

        function selectAllPlans() {
            const allCB = document.querySelectorAll('.plan-cb');
            const allChecked = Array.from(allCB).every(cb => cb.checked);
            allCB.forEach(cb => { cb.checked = !allChecked; });
            selectedPlans = new Set();
            document.querySelectorAll('.plan-cb:checked').forEach(cb => {
                const row = cb.closest('.bento-card');
                if (row) selectedPlans.add(row.dataset.vid);
            });
            updateApplyButton();
        }

        function expandAllPlans() {
            // No collapse/expand needed — all content is visible by default
        }

        async function applyMoves() {
            if (!selectedPlans.size) return;
            const btn = document.getElementById('btn-apply');
            btn.disabled = true;
            const origHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Moving ' + selectedPlans.size + '...';

            let moved = 0, failed = 0;
            // Batch ALL selected videos in one API call
            const batchVids = [];
            const batchTargets = {};
            for (const vid of selectedPlans) {
                const plan = aiPlans.find(p => p.video_id === vid);
                if (!plan) continue;
                const targetId = plan.corrected_playlist_id || (targetPlaylists.find(p => p.title === (plan.corrected_playlist || plan.suggested)) || {}).id;
                if (!targetId) continue;
                batchVids.push(vid);
                batchTargets[vid] = targetId;
            }
            // Group by target playlist for batching
            const byTarget = {};
            for (const vid of batchVids) {
                const tid = batchTargets[vid];
                if (!byTarget[tid]) byTarget[tid] = [];
                byTarget[tid].push(vid);
            }
            for (const [targetPlaylistId, vids] of Object.entries(byTarget)) {
                try {
                    const resp = await fetch('/api/watch-later/move', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({video_ids: vids, target_playlist_id: targetPlaylistId})
                    });
                    const data = await resp.json();
                    if (data.moved?.length) moved += data.moved.length;
                    if (data.failed?.length) failed += data.failed.length;
                } catch(e) {
                    failed += vids.length;
                    log(`ERROR moving videos to ${targetPlaylistId}: ${e.message}`);
                    toast(`Failed to move videos to ${targetPlaylistId}: ${DOMPurify.sanitize(e.message || 'Network error')}`, 'error');
                }
                // Remove from UI
                vids.forEach(vid => {
                    const row = document.querySelector('[data-vid="' + vid + '"]');
                    if (row) row.style.opacity = '0.3';
                });
            }

            toast('Moved ' + moved + ' video(s), ' + failed + ' failed', moved > 0 ? 'success' : 'warning');
            log('Applied: ' + moved + ' moved, ' + failed + ' failed');
            selectedPlans.clear();
            updateApplyButton();
            btn.disabled = false;
            btn.innerHTML = origHTML;
        }

        // Auto-load on page load
        document.addEventListener('DOMContentLoaded', () => {
            fetchWatchLaterRaw();
        });
    </script>
    <script src="/static/ux-enhancements.js"></script>
    <script src="/static/mobile-nav.js"></script>
</body>
</html>
