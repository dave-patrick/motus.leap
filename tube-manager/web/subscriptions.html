<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscriptions - motus.leap</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f1115; color: #e5e5e5; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .bento-card { background-color: #1a1d24; border: 1px solid #2a2f3a; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        .nav-item.active { background-color: #06b6d4; color: #ffffff; }
        .nav-item:not(.active):hover { background-color: #2a2f3a; color: #ffffff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="/static/auth-check.js"></script>
    <script src="/static/subscriptions.js"></script>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-cyan-500/30">
    <header class="h-16 border-b border-[#2a2f3a] bg-[#0f1115] flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-3">
            <img src="/static/logo_icon.png?v=2" alt="motus.leap" class="w-8 h-8 object-contain">
            <h1 class="text-xl font-semibold text-white tracking-tight">motus.leap</h1>
        </div>
        <button onclick="logout()" class="w-8 h-8 rounded-lg bg-[#1a1d24] border border-[#2a2f3a] text-gray-400 hover:text-white flex items-center justify-center transition-colors" title="Logout"><i class="fa-solid fa-arrow-right-from-bracket text-xs"></i></button>
    </header>
    <div class="flex flex-1 overflow-hidden">
        <aside class="w-60 bg-[#1a1d24] p-3 flex flex-col border-r border-[#2a2f3a] shrink-0 overflow-y-auto">
            <nav class="flex flex-col gap-1">
                <a href="/dashboard" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 text-sm transition-colors duration-200"><i class="fas fa-th-large w-5 text-center"></i> Dashboard</a>
                <a href="/playlists" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 text-sm transition-colors duration-200"><i class="fas fa-list-ul w-5 text-center"></i> Playlists</a>
                <a href="/subscriptions" class="nav-item active flex items-center gap-3 px-3 py-2.5 rounded-lg font-semibold text-sm transition-colors duration-200"><i class="fab fa-youtube w-5 text-center"></i> Subscriptions</a>
                <a href="/maintenance" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 text-sm transition-colors duration-200"><i class="fas fa-wrench w-5 text-center"></i> Maintenance Queue</a>
            </nav>
            <div class="mt-auto pt-2 border-t border-[#2a2f3a]">
                <a href="/settings" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 text-sm transition-colors duration-200"><i class="fas fa-cog w-5 text-center"></i> Settings</a>
            </div>
        </aside>
        <main class="flex-1 overflow-y-auto p-6 bg-[#0f1115]">
            <div class="flex flex-col gap-4 min-w-[900px] max-w-[1600px] mx-auto w-full">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold text-white">Subscriptions</h2>
                    <button onclick="refreshSubscriptions()" class="bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-medium px-4 py-2 rounded-lg flex items-center gap-2"><i class="fa-solid fa-sync"></i> Refresh</button>
                </div>
                <div class="bento-card overflow-hidden">
                    <div class="p-4 border-b border-[#2a2f3a]"><h3 class="text-xs font-semibold text-gray-300">Subscribed Channels</h3></div>
                    <div class="p-3 overflow-y-auto" id="subscriptions-list"><div class="text-center text-gray-400 py-8">Loading...</div></div>
                </div>
            </div>
        </main>
    </div>

    <div id="sub-maint-modal" class="hidden fixed inset-0 z-50">
        <div class="absolute inset-0 bg-black/60" onclick="closeMaintenanceModal()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-lg bento-card">
            <div class="p-4 border-b border-[#2a2f3a] flex items-center justify-between">
                <div>
                    <div class="text-xs font-semibold text-gray-300">Playlist Maintenance</div>
                    <div class="text-[10px] text-gray-400" id="sub-maint-title">Channel</div>
                </div>
                <button onclick="closeMaintenanceModal()" class="text-gray-400 hover:text-white text-xs">Close</button>
            </div>
            <div class="p-4 flex flex-col gap-3">
                <div class="text-[10px] text-gray-400">Mapped playlist: <span id="sub-maint-playlist" class="text-gray-300">-</span></div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bento-card p-3"><div class="text-[10px] text-gray-400">Duplicates</div><div class="text-xs text-gray-200" id="sub-maint-dupes">-</div></div>
                    <div class="bento-card p-3"><div class="text-[10px] text-gray-400">Misplaced</div><div class="text-xs text-gray-200" id="sub-maint-misplaced">-</div></div>
                </div>
                <div class="text-[10px] text-gray-400" id="sub-maint-note"></div>
                <div class="hidden items-center gap-2 text-[10px] text-gray-300" id="sub-maint-next"><input type="checkbox" class="rounded bg-[#20242c] border border-[#2a2f3a]"> Queue cleanup for this playlist</div>
            </div>
        </div>
    </div>
</body>
</html>
