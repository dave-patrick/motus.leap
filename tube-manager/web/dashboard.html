<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>motus.leap - Dashboard</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f1115; color: #e5e5e5; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .accent { color: #2f8fc9; }
        .accent-bg { background-color: #2f8fc9; }
        .accent-border { border-color: #2f8fc9; }
        .accent-glow { filter: drop-shadow(0 0 5px rgba(47, 143, 201, 0.6)); }
        .status-badge {
            background-color: rgba(47, 143, 201, 0.13);
            border: 1px solid rgba(47, 143, 201, 0.25);
            color: #2f8fc9;
        }
        .bento-card {
            background-color: #1a1d24;
            border: 1px solid #2a2f3a;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        .console-line { border-left: 2px solid transparent; padding-left: 6px; }
        .console-line.info { border-color: #2f8fc9; }
        .console-line.success { border-color: #22c55e; }
        .console-line.error { border-color: #ef4444; }
        .console-line.warn { border-color: #f59e0b; }
        .nav-item.active { background-color: #2f8fc9; color: #ffffff; }
        .nav-item:not(.active):hover { background-color: #2a2f3a; color: #ffffff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="/static/auth-check.js"></script>
</head>
<body class="flex flex-col h-screen overflow-hidden selection:bg-[#2f8fc9]/30">

    <!-- Unified Banner (image as background) -->
    <div class="w-full h-[160px] bg-[#2d2d2d] bg-[url('C:/Users/davem/AppData/Roaming/Hermes/composer-images/composer_2026-06-21_01-39-47-606_d812cb.png')] bg-cover bg-center bg-no-repeat z-10 shrink-0">
        <!-- The image itself contains all branding and text - no additional HTML elements here -->
    </div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Left Sidebar Navigation -->
        <aside class="w-60 bg-[#1a1d24] p-3 flex flex-col border-r border-[#2a2f3a] shrink-0 overflow-y-auto">
            <nav class="flex flex-col gap-1">
                <a href="/dashboard" class="nav-item active flex items-center gap-3 px-3 py-2.5 rounded-lg font-semibold text-sm transition-colors duration-200">
                    <i class="fas fa-th-large w-5 text-center"></i> Dashboard
                </a>
                <a href="/playlists" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 text-sm transition-colors duration-200">
                    <i class="fas fa-list-ul w-5 text-center"></i> Playlists
                </a>
                <a href="/subscriptions" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 text-sm transition-colors duration-200">
                    <i class="fab fa-youtube w-5 text-center"></i> Subscriptions
                </a>
                <a href="/maintenance" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 text-sm transition-colors duration-200">
                    <i class="fas fa-wrench w-5 text-center"></i> Maintenance Queue
                </a>
            </nav>
            <div class="mt-auto pt-2 border-t border-[#2a2f3a]">
                <a href="/settings" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 text-sm transition-colors duration-200">
                    <i class="fas fa-cog w-5 text-center"></i> Settings
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 p-6 bg-[#0f1115] overflow-y-auto">
            <div class="max-w-7xl mx-auto flex flex-col gap-6">

                <h3 class="text-2xl font-bold text-white">Dashboard</h3>

                <!-- Stats Grid -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bento-card p-4">
                        <div class="text-[10px] text-gray-400 uppercase tracking-wider mb-1">Playlists</div>
                        <div class="text-2xl font-bold text-white" id="stat-playlists">--</div>
                    </div>
                    <div class="bento-card p-4">
                        <div class="text-[10px] text-gray-400 uppercase tracking-wider mb-1">Videos</div>
                        <div class="text-2xl font-bold text-white" id="stat-videos">--</div>
                    </div>
                    <div class="bento-card p-4">
                        <div class="text-[10px] text-gray-400 uppercase tracking-wider mb-1">Watch Later</div>
                        <div class="text-2xl font-bold text-white" id="stat-watch-later">--</div>
                    </div>
                    <div class="bento-card p-4">
                        <div class="text-[10px] text-gray-400 uppercase tracking-wider mb-1">Subscriptions</div>
                        <div class="text-2xl font-bold text-white" id="stat-subscriptions">--</div>
                    </div>
                </div>

                <!-- Agent Control Center -->
                <div class="bento-card p-5">
                    <h4 class="text-xs font-semibold text-gray-300 mb-4 flex items-center gap-2"><i class="fas fa-robot accent"></i> Agent Control Center</h4>
                    <div class="flex flex-wrap items-center justify-center gap-3">
                        <button id="btn-fetch-all" class="px-4 py-2.5 rounded-lg accent-bg hover:bg-[#2a7db8] text-white text-xs font-semibold flex items-center gap-2 transition-colors"><i class="fas fa-sync"></i> Full Playlist Sync</button>
                        <button id="btn-watch-later" class="px-4 py-2.5 rounded-lg accent-bg hover:bg-[#2a7db8] text-white text-xs font-semibold flex items-center gap-2 transition-colors"><i class="fas fa-clock"></i> Watch Later Sync</button>
                        <button id="btn-maintenance" class="px-4 py-2.5 rounded-lg bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-xs font-semibold flex items-center gap-2 transition-colors"><i class="fas fa-wrench"></i> Run Maintenance</button>
                        <button id="btn-cancel" class="px-4 py-2.5 rounded-lg bg-red-600/20 hover:bg-red-600/30 border border-red-500/30 text-red-400 text-xs font-semibold flex items-center gap-2 transition-colors"><i class="fas fa-stop"></i> Cancel Task</button>
                    </div>
                </div>

                <!-- Scan Details + Live Console -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bento-card p-5 lg:col-span-1">
                        <h4 class="text-xs font-semibold text-gray-300 mb-4 flex items-center gap-2"><i class="fas fa-radar accent"></i> Scan Details</h4>
                        <div class="space-y-3 text-xs text-gray-400">
                            <div class="flex justify-between border-b border-[#2a2f3a] pb-2"><span>Last Scan</span><span id="last-scan" class="text-gray-300 font-mono">--</span></div>
                            <div class="flex justify-between border-b border-[#2a2f3a] pb-2"><span>Status</span><span id="scan-status" class="text-[#2f8fc9] font-medium">Idle</span></div>
                            <div class="flex justify-between border-b border-[#2a2f3a] pb-2"><span>Queued Tasks</span><span id="queued-tasks" class="text-gray-300 font-mono">0</span></div>
                            <div class="flex justify-between"><span>Active Workers</span><span id="active-workers" class="text-gray-300 font-mono">1</span></div>
                        </div>
                    </div>

                    <div class="bento-card p-5 lg:col-span-2 flex flex-col h-[320px]">
                        <div class="flex items-center justify-between mb-3">
                            <h4 class="text-xs font-semibold text-gray-300 flex items-center gap-2"><i class="fas fa-terminal accent"></i> Live Console</h4>
                            <div class="flex gap-2">
                                <button id="btn-copy-console" class="text-[10px] px-2 py-1 rounded bg-[#20242c] border border-[#2a2f3a] text-gray-400 hover:text-white transition-colors"><i class="fas fa-copy mr-1"></i>Copy</button>
                                <button id="btn-export-console" class="text-[10px] px-2 py-1 rounded bg-[#20242c] border border-[#2a2f3a] text-gray-400 hover:text-white transition-colors"><i class="fas fa-download mr-1"></i>Export</button>
                                <button id="btn-clear-console" class="text-[10px] px-2 py-1 rounded bg-[#20242c] border border-[#2a2f3a] text-gray-400 hover:text-white transition-colors"><i class="fas fa-trash mr-1"></i>Clear</button>
                            </div>
                        </div>
                        <div id="console-output" class="flex-1 bg-[#0a0c10] border border-[#2a2f3a] rounded p-3 font-mono text-[10px] text-gray-400 overflow-y-auto space-y-1">
                            <div class="console-line info">Dashboard connected.</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/dashboard.js"></script>
    <script src="/static/ux-enhancements.js"></script>
</body>
</html>
