<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist - motus.leap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0f0f0f;
            color: #e2e8f0;
        }
    </style>
</head>
<body class="dark min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <nav class="flex items-center justify-between mb-6">
            <button onclick="backToPlaylists()" class="bg-[#2f8fc9] hover:bg-[#2a7bb9] text-white px-4 py-2 rounded-lg">
                <i class="fas fa-arrow-left mr-2"></i> Back to Playlists
            </button>
            <div>
                <h1 class="text-3xl font-bold text-white">Playlist: <span id="playlist-title">Loading...</span></h1>
                <p class="text-gray-400 text-sm mt-1"><span id="playlist-count">0 videos</span></p>
            </div>
        </nav>

        <div id="videos-container">
            <div class="animate-pulse space-y-4">
                <div class="bg-[#16181c] h-20 rounded-lg"></div>
                <div class="bg-[#16181c] h-20 rounded-lg"></div>
                <div class="bg-[#16181c] h-20 rounded-lg"></div>
            </div>
        </div>
    </div>

    <script>
        function backToPlaylists() {
            window.location.href = '/playlists';
        }
        
        async function loadPlaylist() {
            const container = document.getElementById('videos-container');
            if (!container) {
                console.error('Videos container not found!');
                return;
            }
            
            try {
                console.log('Loading playlist...');
                const response = await fetch('/api/playlists');
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Playlist data:', data);
                
                // Update UI
                document.getElementById('playlist-title').textContent = data.title || 'Unknown Playlist';
                document.getElementById('playlist-count').textContent = `${data.video_count || 0} videos`;
                
                // Replace skeleton with videos
                container.innerHTML = data.videos.map(video => `
                    <div class="bg-[#16181c] rounded-lg p-4 hover:bg-[#1e222a] transition-all">
                        <div class="flex items-center space-x-4">
                            <img src="${video.thumbnail || 'https://i.ytimg.com/vi/default/mqdefault.jpg'}" 
                                 alt="${video.title}" class="w-20 h-12 object-cover rounded">
                            <div class="flex-1">
                                <h3 class="text-white font-medium">${video.title || 'Unknown Title'}</h3>
                                <p class="text-gray-400 text-sm">${video.channel || 'Unknown Channel'}</p>
                            </div>
                            <div class="flex space-x-2">
                                <button onclick="refreshVideo('${video.id}')" class="text-gray-400 hover:text-white">
                                    <i class="fas fa-refresh"></i>
                                </button>
                                <button onclick="openVideo('${video.id}')" class="text-gray-400 hover:text-white">
                                    <i class="fas fa-external-link-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error loading playlist:', error);
                container.innerHTML = `
                    <div class="text-center p-8">
                        <i class="fas fa-exclamation-triangle text-4xl text-red-500 mb-4"></i>
                        <h2 class="text-xl font-semibold text-white mb-2">Failed to Load Playlist</h2>
                        <p class="text-gray-400">${error.message}</p>
                        <button onclick="window.location.href='/auth'" class="bg-[#2f8fc9] hover:bg-[#2a7bb9] text-white px-6 py-2 rounded mt-4">
                            Go to Login
                        </button>
                    </div>
                `;
            }
        }
        
        function refreshVideo(videoId) {
            console.log('Refreshing video:', videoId);
            // Placeholder implementation
            alert('Refresh functionality not implemented yet');
        }
        
        function openVideo(videoId) {
            console.log('Opening video:', videoId);
            window.open(`https://youtube.com/watch?v=${videoId}`, '_blank');
        }
        
        // Initialize page
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadPlaylist);
        } else {
            loadPlaylist();
        }
    </script>
</body>
</html>
