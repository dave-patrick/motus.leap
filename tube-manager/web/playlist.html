<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist - motus.leap</title>
    <link rel="icon" type="image/png" href="/static/favicon.png?v=1781919149">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com /static/ux-enhancements.js?v=1781919149 /static/auth-check.js?v=1781919149 /static/global_scripts.js?v=1781919149 /static/playlist.js; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' wss: https:; frame-ancestors 'self';">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #121419; color: #e5e5e5; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .bento-card { background-color: #1a1d24; border: 1px solid #2a2f3a; border-radius: 12px; }
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        .video-row { border-top: 1px solid #2a2f3a; padding: 8px 12px; transition: background-color 0.2s; }
        .video-row:hover { background-color: #20242c; }
        .video-row.selected { background-color: rgba(47, 143, 201, 0.2); }
        
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slide-out {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(100%); }
        }
        .animate-slide-in { animation: slide-in 0.3s ease-out; }
        .animate-slide-out { animation: slide-out 0.3s ease-in; }
    </style>
    <link rel="stylesheet" href="/static/ux-enhancements.css?v=1781919149">
    <script src="/static/ux-enhancements.js?v=1781919149"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="/static/global_scripts.js?v=1781919149"></script>
    <script src="/static/auth-check.js?v=1781919149"></script>
    <script src="/static/playlist.js?v=1781919149"></script>
</head>
<div id="mobile-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden" onclick="closeMobileSidebar()"></div>
<button id="sidebar-toggle" onclick="openMobileSidebar()" class="fixed top-3 left-3 z-30 md:hidden inline-flex items-center justify-center w-10 h-10 rounded-lg bg-[#1a1d24] border border-[#2a2f3a] text-gray-300" aria-label="Open menu"><i class="fas fa-bars"></i></button>
<body class="min-h-screen flex flex-col selection:bg-[#2f8fc9]/30">
    <header class="h-16 border-b border-[#2a2f3a] bg-[#16191f] flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='/playlists'" class="text-gray-400 hover:text-white"><i class="fa-solid fa-arrow-left"></i></button>
            <div><h1 class="text-sm font-bold tracking-wide text-white leading-tight" id="playlist-title">Loading...</h1><p class="text-[10px] text-gray-400" id="playlist-meta">-- videos</p></div>
        </div>
        <div class="flex items-center gap-2">
            <button id="move-btn" class="bg-[#2f8fc9] hover:bg-[#2a7db8] text-white text-[10px] font-medium px-3 py-1.5 rounded-lg flex items-center gap-1.5 hidden"><i class="fa-solid fa-up-right-and-down-left-from-center"></i> Move Selected</button>
        </div>
    </header>
    <div class="flex flex-1 overflow-hidden">
        <aside id="mobile-sidebar" class="fixed inset-y-0 left-0 z-50 w-56 bg-[#16191f] p-4 flex flex-col gap-1 transform -translate-x-full md:translate-x-0 transition-transform duration-200 overflow-y-auto md:relative md:z-auto border-r border-[#2a2f3a]">
            <a href="/dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-border-all w-5 text-center"></i> Dashboard</a>
            <a href="/playlists" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-[#2f8fc9]/20 text-[#2f8fc9] text-xs font-semibold border border-[#2f8fc9]/30"><i class="fa-solid fa-list w-5 text-center"></i> Playlists</a>
            <a href="/subscriptions" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-brands fa-youtube w-5 text-center"></i> Subscriptions</a>
        </aside>
        <main class="flex-1 overflow-y-auto p-4 bg-[#121419]">
            <div class="flex flex-col gap-3  max-w-[1600px] mx-auto w-full">
                
                <!-- Operations Panel (Scan Buttons and Results Box) -->
                <div class="bento-card p-4 flex flex-col gap-3 shrink-0">
                    <div class="flex items-center justify-between">
                        <div>
                            <h3 class="text-xs font-semibold text-white">Playlist Operations</h3>
                            <p class="text-[10px] text-gray-400">Rescan videos from YouTube, scan for duplicate entries, or detect misplaced videos based on your rules.</p>
                        </div>
                        <div class="flex gap-2">
                            <button id="rescan-playlist-btn" class="bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-[11px] font-semibold px-4 py-2.5 rounded-lg flex items-center gap-1.5 transition-colors"><i class="fa-solid fa-arrows-rotate text-[#2f8fc9]"></i> Rescan Playlist</button>
                            <button id="btn-scan-dup" class="bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-[11px] font-semibold px-4 py-2.5 rounded-lg flex items-center gap-1.5 transition-all"><i class="fa-solid fa-copy text-[#2f8fc9]"></i> Scan Duplicates</button>
                            <button id="btn-scan-mis" class="bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-[11px] font-semibold px-4 py-2.5 rounded-lg flex items-center gap-1.5 transition-all"><i class="fa-solid fa-triangle-exclamation text-yellow-500"></i> Scan Misplaced</button>
                        </div>
                    </div>
                    
                    <!-- Scan Results Box (hidden initially) -->
                    <div id="scan-results-box" class="hidden border border-[#2a2f3a] bg-[#16191f] rounded-lg p-3">
                        <div class="flex items-center justify-between mb-2.5 pb-2 border-b border-[#2a2f3a]">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-bold text-white flex items-center gap-1.5"><i class="fa-solid fa-clipboard-list text-[#2f8fc9]"></i> Scan Results</span>
                                <span id="scan-results-summary" class="text-[9px] text-gray-400 px-1.5 py-0.5 rounded bg-[#20242c] border border-[#2a2f3a]"></span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button id="delete-duplicates-btn" class="hidden bg-red-950/50 hover:bg-red-900/50 border border-red-500/30 text-red-200 text-[10px] font-bold px-3 py-1.5 rounded-lg flex items-center gap-2 transition-colors">
                                    <i class="fa-solid fa-trash-can"></i> Delete Duplicates
                                </button>
                                <button id="move-misplaced-btn" class="hidden bg-[#2f8fc9] hover:bg-[#2a7db8] text-white text-[10px] font-bold px-3 py-1.5 rounded-lg flex items-center gap-2 transition-colors">
                                    <i class="fa-solid fa-share-from-square"></i> Move Misplaced
                                </button>
                                <label for="scan-filter" class="text-[10px] text-gray-400 font-medium">Filter Results:</label>
                                <select id="scan-filter" onchange="filterScanResults()" class="bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-[10px] rounded px-2.5 py-1 outline-none font-semibold cursor-pointer">
                                    <option value="all">All Issues</option>
                                    <option value="duplicates">Duplicates only</option>
                                    <option value="misplaced">Misplaced only</option>
                                </select>
                            </div>
                        </div>
                        <div id="scan-results-list" class="space-y-1.5 max-h-48 overflow-y-auto font-mono text-[11px] text-gray-300">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                </div>

                <!-- Videos List Container -->
                <div class="bento-card p-0" id="videos-container">
                    <div class="p-4 space-y-3" id="videos-skeleton">
                        <div class="animate-pulse space-y-3">
                            <div class="h-20 rounded bg-[#1e222a]"></div>
                            <div class="h-3 rounded bg-[#1e222a] w-3/4"></div>
                            <div class="h-3 rounded bg-[#1e222a] w-1/2"></div>
                        </div>
                        <div class="animate-pulse space-y-3">
                            <div class="h-20 rounded bg-[#1e222a]"></div>
                            <div class="h-3 rounded bg-[#1e222a] w-2/3"></div>
                            <div class="h-3 rounded bg-[#1e222a] w-1/3"></div>
                        </div>
                    </div>
                    <div class="hidden p-4" id="videos-list"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="/static/mobile-nav.js"></script>
</body>
</html>
