<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist - motus.leap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <nav class="mb-6">
            <button onclick="backToPlaylists()" class="bg-blue-600 text-white px-4 py-2 rounded">
                <i class="fas fa-arrow-left mr-2"></i> Back to Playlists
            </button>
            <h1 class="text-3xl font-bold mt-4">Playlist: <span id="playlist-title">Loading...</span></h1>
        </nav>
        
        <div id="videos-container">
            <div class="animate-pulse space-y-4">
                <div class="h-20 bg-gray-800 rounded"></div>
                <div class="h-20 bg-gray-800 rounded"></div>
                <div class="h-20 bg-gray-800 rounded"></div>
            </div>
        </div>
    </div>
    
    <script>
        console.log('Playlist page loaded');
        
        function backToPlaylists() {
            console.log('Navigating back to playlists');
            window.location.href = '/playlists';
        }
        
        function initPlaylistPage() {
            console.log('Starting initPlaylistPage');
            
            const container = document.getElementById('videos-container');
            if (!container) {
                console.error('Videos container not found!');
                return;
            }
            
            console.log('Videos container found successfully');
            
            // Test API call
            fetch('/api/playlists')
                .then(response => {
                    console.log('API response status:', response.status);
                    if (response.ok) {
                        return response.json();
                    } else {
                        throw new Error('API request failed');
                    }
                })
                .then(data => {
                    console.log('API data:', data);
                    document.getElementById('playlist-title').textContent = data.title || 'Unknown Playlist';
                    
                    // Replace skeleton with content
                    container.innerHTML = `
                        <div class="space-y-4">
                            <div class="bg-gray-800 p-4 rounded">
                                <h3 class="text-white">Test Content Loaded</h3>
                                <p class="text-gray-400">API call successful</p>
                            </div>
                        </div>
                    `;
                })
                .catch(error => {
                    console.error('API error:', error);
                    container.innerHTML = `
                        <div class="text-center p-8">
                            <i class="fas fa-exclamation-triangle text-4xl text-red-500 mb-4"></i>
                            <h2 class="text-xl font-semibold text-white mb-2">Failed to Load</h2>
                            <p class="text-gray-400">${error.message}</p>
                            <button onclick="window.location.href='/auth'" class="bg-blue-600 text-white px-6 py-2 rounded mt-4">
                                Go to Login
                            </button>
                        </div>
                    `;
                });
        }
        
        // Initialize on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initPlaylistPage);
        } else {
            initPlaylistPage();
        }
    </script>
</body>
</html>
