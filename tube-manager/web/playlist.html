<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist - Tube Manager</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' wss: https:; frame-ancestors 'self';">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #121419; color: #e5e5e5; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .bento-card { background-color: #1a1d24; border: 1px solid #2a2f3a; border-radius: 12px; }
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        .video-row { border-top: 1px solid #2a2f3a; padding: 8px 12px; transition: background-color 0.2s; }
        .video-row:hover { background-color: #20242c; }
        .video-row.selected { background-color: rgba(59, 130, 246, 0.2); }
        
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slide-out {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(100%); }
        }
        .animate-slide-in { animation: slide-in 0.3s ease-out; }
        .animate-slide-out { animation: slide-out 0.3s ease-in; }
    </style>
    <link rel="stylesheet" href="/static/ux-enhancements.css">
    <script src="/static/ux-enhancements.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="/static/auth-check.js"></script>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-blue-500/30">
    <header class="h-16 border-b border-[#2a2f3a] bg-[#16191f] flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='/playlists'" class="text-gray-400 hover:text-white"><i class="fa-solid fa-arrow-left"></i></button>
            <div><h1 class="text-sm font-bold tracking-wide text-white leading-tight" id="playlist-title">Loading...</h1><p class="text-[10px] text-gray-400" id="playlist-meta">-- videos</p></div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="moveSelectedVideos()" id="move-btn" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-medium px-3 py-1.5 rounded-lg flex items-center gap-1.5 hidden"><i class="fa-solid fa-up-right-and-down-left-from-center"></i> Move Selected</button>
        </div>
    </header>
    <div class="flex flex-1 overflow-hidden">
        <aside class="w-56 border-r border-[#2a2f3a] bg-[#16191f] p-4 flex flex-col gap-1 shrink-0 overflow-y-auto">
            <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-solid fa-border-all w-5 text-center"></i> Dashboard</a>
            <a href="/playlists" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-600/20 text-blue-400 text-xs font-semibold border border-blue-500/30"><i class="fa-solid fa-list w-5 text-center"></i> Playlists</a>
            <a href="/subscriptions" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-200 hover:bg-[#2a2f3a] text-xs font-medium transition-colors"><i class="fa-brands fa-youtube w-5 text-center"></i> Subscriptions</a>
        </aside>
        <main class="flex-1 overflow-y-auto p-4 bg-[#121419]">
            <div class="flex flex-col gap-3 min-w-[800px]">
                
                <!-- Operations Panel (Scan Buttons and Results Box) -->
                <div class="bento-card p-4 flex flex-col gap-3 shrink-0">
                    <div class="flex items-center justify-between">
                        <div>
                            <h3 class="text-xs font-semibold text-white">Diagnostic Operations</h3>
                            <p class="text-[10px] text-gray-400">Scan this playlist for duplicates and misplaced videos based on your channel mapping rules.</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="scanForDuplicates()" id="btn-scan-dup" class="bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-[10px] font-semibold px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition-all"><i class="fa-solid fa-copy text-blue-400"></i> Scan Duplicates</button>
                            <button onclick="scanForMisplaced()" id="btn-scan-mis" class="bg-[#20242c] hover:bg-[#2a2f3a] border border-[#2a2f3a] text-gray-300 text-[10px] font-semibold px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition-all"><i class="fa-solid fa-triangle-exclamation text-yellow-500"></i> Scan Misplaced</button>
                        </div>
                    </div>
                    
                    <!-- Scan Results Box (hidden initially) -->
                    <div id="scan-results-box" class="hidden border border-[#2a2f3a] bg-[#16191f] rounded-lg p-3">
                        <div class="flex items-center justify-between mb-2.5 pb-2 border-b border-[#2a2f3a]">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-bold text-white flex items-center gap-1.5"><i class="fa-solid fa-clipboard-list text-blue-400"></i> Scan Diagnostic Results</span>
                                <span id="scan-results-summary" class="text-[9px] text-gray-400 px-1.5 py-0.5 rounded bg-[#20242c] border border-[#2a2f3a]"></span>
                            </div>
                            <div class="flex items-center gap-2">
                                <label for="scan-filter" class="text-[10px] text-gray-400 font-medium">Filter Results:</label>
                                <select id="scan-filter" onchange="filterScanResults()" class="bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-[10px] rounded px-2.5 py-1 outline-none font-semibold cursor-pointer">
                                    <option value="all">All Issues</option>
                                    <option value="duplicates">Duplicates only</option>
                                    <option value="misplaced">Misplaced only</option>
                                </select>
                            </div>
                        </div>
                        <div id="scan-results-list" class="space-y-1.5 max-h-48 overflow-y-auto font-mono text-[11px] text-gray-300">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                </div>

                <!-- Videos List Container -->
                <div class="bento-card p-0" id="videos-container">
                    <div class="text-center p-8 text-gray-400"><i class="fa-solid fa-spinner fa-spin"></i> Loading videos...</div>
                </div>
            </div>
        </main>
    </div>
    <script>
        // Toast notification system
        function toast(message, type = 'info', duration = 4000) {
            const container = document.getElementById('toast-container') || createToastContainer();
            const toast = document.createElement('div');
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            const colors = {
                success: 'bg-green-600',
                error: 'bg-red-600',
                warning: 'bg-yellow-600',
                info: 'bg-blue-600'
            };
            toast.className = `flex items-center gap-2 px-4 py-3 rounded-lg shadow-lg text-white text-xs font-medium animate-slide-in ${colors[type] || colors.info}`;
            toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.info}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('animate-slide-out');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.id = 'toast-container';
            container.className = 'fixed top-4 right-4 z-50 flex flex-col gap-2 w-80';
            document.body.appendChild(container);
            return container;
        }

        let allVideos = [];
        let selectedVideos = new Set();
        let playlistId = window.location.pathname.split('/').pop();
        let allPlaylists = [];
        let currentScanResults = {
            duplicates: [],
            misplaced: []
        };

        function formatDuration(seconds) {
            seconds = parseInt(seconds) || 0;
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return h > 0 ? `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}` : `${m}:${s.toString().padStart(2, '0')}`;
        }

        async function loadPlaylist() {
            try {
                const resp = await fetch(`/api/youtube/videos?playlist_id=${playlistId}`);
                const data = await resp.json();
                allVideos = data.videos || [];
                document.getElementById('playlist-title').textContent = allVideos[0]?.playlist_title || 'Unknown Playlist';
                document.getElementById('playlist-meta').textContent = `${allVideos.length} videos`;
                renderVideos();
            } catch (e) {
                document.getElementById('videos-container').innerHTML = '<div class="text-center p-8 text-red-400">Failed to load videos</div>';
            }
        }

        function renderVideos() {
            const container = document.getElementById('videos-container');
            if (!allVideos.length) {
                container.innerHTML = '<div class="text-center p-8 text-gray-400">No videos in this playlist</div>';
                return;
            }
            container.innerHTML = `
                <div class="p-3 border-b border-[#2a2f3a] flex items-center justify-between">
                    <span class="text-[10px] text-gray-400">Select videos to move (click checkboxes)</span>
                    <select id="target-playlist" class="bg-[#20242c] border border-[#2a2f3a] text-gray-300 text-[10px] rounded px-2 py-1 outline-none">
                        <option value="">Select target playlist...</option>
                    </select>
                </div>
                ${allVideos.map((v, i) => `
                    <div class="video-row flex items-center gap-2 py-1" data-video-id="${v.video_id}">
                        <input type="checkbox" class="video-checkbox w-4 h-4 rounded" onchange="toggleVideo('${v.video_id}', this)">
                        <img src="${v.thumbnail || 'https://picsum.photos/160/90'}" class="w-24 h-14 rounded object-cover flex-shrink-0">
                        <div class="flex-1 min-w-0">
                            <div class="text-[11px] text-white truncate">${v.title || 'Unknown title'}</div>
                            <div class="text-[9px] text-gray-400">${v.channel_title || 'Unknown channel'}</div>
                        </div>
                        <span class="text-[9px] text-gray-300 font-mono bg-[#20242c] px-1.5 py-0.5 rounded">${formatDuration(v.duration)}</span>
                        <span class="text-[9px] text-gray-500 w-12 text-right">${i + 1}</span>
                    </div>
                `).join('')}
            `;
            loadPlaylistsDropdown();
        }

        async function loadPlaylistsDropdown() {
            try {
                const resp = await fetch('/api/playlists');
                const data = await resp.json();
                allPlaylists = data.playlists || [];
                const select = document.getElementById('target-playlist');
                select.innerHTML = '<option value="">Select target playlist...</option>' + 
                    allPlaylists.map(p => `<option value="${p.id}">${p.title}</option>`).join('');
                
                // Display playlist privacy status on the page
                const currentPlaylist = allPlaylists.find(p => p.id === playlistId);
                if (currentPlaylist) {
                    const privacy = currentPlaylist.privacy || 'private';
                    const badgeColor = privacy === 'public' ? 'bg-green-600/20 text-green-400 border-green-600/30' : 
                                       privacy === 'unlisted' ? 'bg-yellow-600/20 text-yellow-400 border-yellow-600/30' : 
                                       'bg-gray-600/20 text-gray-400 border-gray-600/30';
                    document.getElementById('playlist-meta').innerHTML = `
                        ${allVideos.length} videos • <span class="text-[9px] px-1.5 py-0.5 rounded border uppercase font-bold ${badgeColor}">${privacy}</span>
                    `;
                }
            } catch (e) {
                console.error('Failed to load playlists');
            }
        }

        function toggleVideo(videoId, checkbox) {
            if (checkbox.checked) {
                selectedVideos.add(videoId);
            } else {
                selectedVideos.delete(videoId);
            }
            updateMoveButton();
        }

        function updateMoveButton() {
            const moveBtn = document.getElementById('move-btn');
            moveBtn.classList.toggle('hidden', selectedVideos.size === 0);
        }

        async function moveSelectedVideos() {
            const targetId = document.getElementById('target-playlist').value;
            if (!targetId || selectedVideos.size === 0) {
                toast('Please select videos and target playlist', 'error');
                return;
            }
            const videoIds = Array.from(selectedVideos);
            try {
                const resp = await fetch('/api/bulk/move', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({video_ids: videoIds, target_playlist_id: targetId, source_playlist_id: playlistId})
                });
                const result = await resp.json();
                toast(`Moved ${videoIds.length} videos`, 'success');
                selectedVideos.clear();
                updateMoveButton();
                loadPlaylist();
            } catch (e) {
                toast('Failed to move videos', 'error');
            }
        }

        async function scanForDuplicates() {
            const btn = document.getElementById('btn-scan-dup');
            const origHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-blue-400"></i> Scanning...';
            
            toast('Scanning for duplicates...', 'info');
            try {
                // Client-side detection over allVideos
                const counts = {};
                allVideos.forEach(v => {
                    counts[v.video_id] = (counts[v.video_id] || 0) + 1;
                });
                
                currentScanResults.duplicates = [];
                allVideos.forEach(v => {
                    if (counts[v.video_id] > 1) {
                        currentScanResults.duplicates.push({
                            video_id: v.video_id,
                            title: v.title,
                            channel: v.channel_title,
                            reason: `Duplicate entry (${counts[v.video_id]} occurrences)`,
                            type: 'duplicate'
                        });
                    }
                });
                
                // Deduplicate items in list by video_id
                const uniqueDups = [];
                const addedIds = new Set();
                currentScanResults.duplicates.forEach(item => {
                    if (!addedIds.has(item.video_id)) {
                        addedIds.add(item.video_id);
                        uniqueDups.push(item);
                    }
                });
                currentScanResults.duplicates = uniqueDups;
                
                toast(`Scan complete - ${currentScanResults.duplicates.length} duplicate videos found`, 'success');
                showScanBox('duplicates');
            } catch (e) {
                toast('Scan failed', 'error');
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = origHTML;
            }
        }

        async function scanForMisplaced() {
            const btn = document.getElementById('btn-scan-mis');
            const origHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-yellow-500"></i> Scanning...';
            
            toast('Scanning for misplaced videos...', 'info');
            try {
                const resp = await fetch(`/api/youtube/misplaced?playlist_id=${playlistId}`);
                if (!resp.ok) throw new Error('API failed');
                const result = await resp.json();
                
                currentScanResults.misplaced = (result.misplaced || []).map(v => ({
                    video_id: v.video_id,
                    title: v.title,
                    channel: v.channel || '',
                    reason: v.reason || 'Misplaced channel',
                    type: 'misplaced'
                }));
                
                toast(`Scan complete - ${currentScanResults.misplaced.length} misplaced videos found`, 'success');
                showScanBox('misplaced');
            } catch (e) {
                toast('Scan failed', 'error');
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = origHTML;
            }
        }

        function showScanBox(defaultFilter) {
            const box = document.getElementById('scan-results-box');
            box.classList.remove('hidden');
            
            const filterSelect = document.getElementById('scan-filter');
            filterSelect.value = defaultFilter || 'all';
            
            updateScanSummary();
            filterScanResults();
        }

        function updateScanSummary() {
            const summary = document.getElementById('scan-results-summary');
            const dupCount = currentScanResults.duplicates.length;
            const misCount = currentScanResults.misplaced.length;
            summary.textContent = `${dupCount} Duplicates • ${misCount} Misplaced`;
        }

        function filterScanResults() {
            const filterValue = document.getElementById('scan-filter').value;
            const listEl = document.getElementById('scan-results-list');
            
            let displayList = [];
            if (filterValue === 'all') {
                displayList = [...currentScanResults.duplicates, ...currentScanResults.misplaced];
            } else if (filterValue === 'duplicates') {
                displayList = currentScanResults.duplicates;
            } else if (filterValue === 'misplaced') {
                displayList = currentScanResults.misplaced;
            }
            
            if (displayList.length === 0) {
                listEl.innerHTML = `<div class="text-center py-4 text-gray-500 text-[10px]">No ${filterValue === 'all' ? 'issues' : filterValue} detected.</div>`;
                return;
            }
            
            listEl.innerHTML = displayList.map(item => {
                const isDup = item.type === 'duplicate';
                const badgeColor = isDup ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' : 'bg-yellow-500/10 text-yellow-500 border-yellow-500/20';
                const badgeLabel = isDup ? 'DUPLICATE' : 'MISPLACED';
                const icon = isDup ? 'fa-copy' : 'fa-triangle-exclamation';
                
                return `
                    <div class="flex items-start gap-3 p-2 bg-[#1a1d24] border border-[#2a2f3a] rounded-lg">
                        <span class="text-[9px] font-bold px-1.5 py-0.5 rounded border shrink-0 ${badgeColor}"><i class="fa-solid ${icon} mr-1"></i>${badgeLabel}</span>
                        <div class="flex-1 min-w-0">
                            <div class="font-semibold text-white truncate text-[11px]">${item.title}</div>
                            <div class="text-[10px] text-gray-400 truncate">${item.channel ? item.channel + ' • ' : ''}ID: ${item.video_id}</div>
                            <div class="text-[10px] text-gray-400 mt-1 flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full ${isDup ? 'bg-blue-400' : 'bg-yellow-500'}"></span><span>Reason: ${item.reason}</span></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', loadPlaylist);
    </script>
</body>
</html>
