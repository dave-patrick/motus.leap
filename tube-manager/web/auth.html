<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - motus.leap</title>
    <link rel="icon" type="image/png" href="/static/favicon.png?v=2">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f1115; color: #e5e5e5; margin: 0; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
        .icon { font-size: 48px; margin-bottom: 16px; }
        .title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .message { color: #9ca3af; margin-bottom: 24px; max-width: 400px; }
        .link { color: #2f8fc9; text-decoration: none; }
        .link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon" id="status-icon"></div>
        <div class="title" id="status-title"></div>
        <div class="message" id="status-message"></div>
        <div id="redirect-msg" style="color: #6b7280; font-size: 12px;"></div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const status = params.get('status');
            const type = params.get('type') || '';
            const error = params.get('error') || '';

            const icon = document.getElementById('status-icon');
            const title = document.getElementById('status-title');
            const message = document.getElementById('status-message');
            const redirect = document.getElementById('redirect-msg');

            if (status === 'success' && type === 'youtube') {
                icon.innerHTML = '<span style="color:#44ff88;">✅</span>';
                title.textContent = 'YouTube Connected!';
                message.textContent = 'Your YouTube account has been linked. You can close this window.';
                try { window.opener && window.opener.postMessage({type: 'youtube-oauth-success'}, '*'); } catch(e) {}
                redirect.textContent = 'Closing window shortly...';
                setTimeout(() => window.close(), 1500);
            } else if (status === 'error') {
                icon.innerHTML = '<span style="color:#ff4444;">❌</span>';
                title.textContent = 'OAuth Error';
                message.textContent = error || 'Something went wrong during authentication.';
                try { window.opener && window.opener.postMessage({type: 'youtube-oauth-error', error: error || 'Unknown error'}, '*'); } catch(e) {}
                redirect.innerHTML = 'Return to <a href="/settings" class="link">Settings</a> to try again.';
            } else {
                icon.innerHTML = '<span style="color:#6b7280;">🔒</span>';
                title.textContent = 'Authentication';
                message.textContent = 'No status provided. You can close this window.';
            }
        })();
    </script>
</body>
</html>
