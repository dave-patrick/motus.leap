model:
  default: gpt-5.5
  provider: freemodeldev

providers:
  airforce:
    name: airforce
    base_url: https://api.airforce/v1
    key_env: AIRFORCE_API_KEY
    api_mode: openai
  freemodeldev:
    name: freemodeldev
    base_url: https://freemodel.dev/v1
    key_env: FREEMODELDEV_API_KEY
    api_mode: openai
  naga:
    name: naga
    base_url: https://api.naga.ac/v1
    key_env: NAGA_AC_API_KEY
    api_mode: openai
  nvidia:
    name: nvidia
    base_url: https://integrate.api.nvidia.com/v1
    key_env: NVIDIA_API_KEY
    api_mode: openai
    context_length: 131072
  glm:
    name: glm
    base_url: https://open.bigmodel.cn/api/paas/v4
    key_env: GLM_API_KEY
    api_mode: openai
  deepseek:
    name: deepseek
    base_url: https://api.deepseek.com/v1
    key_env: DEEPSEEK_API_KEY
    api_mode: openai
  agnes:
    name: agnes
    base_url: https://apihub.agnes-ai.com/v1
    key_env: AGNES_API_KEY
    api_mode: openai
  groq:
    name: glm
    base_url: https://api.groq.com/openai/v1
    key_env: GROQ_API_KEY
    api_mode: openai
  zenmux:
    name: zenmux
    base_url: https://zenmux.ai/api/v1
    key_env: ZENMUX_API_KEY
    api_mode: openai
agent:
  max_turns: 150
  verbose: false
  reasoning_effort: none
  personalities:
    surfer: Duuude! You're chatting with the chillest AI on the web, bro! Everything's gonna be totally rad. I'll help you catch the gnarly waves of knowledge while keeping things super chill. Cowabunga! 🤙
    hype: YOOO LET'S GOOOO!!! 🔥🔥🔥 I am SO PUMPED to help you today! Every question is AMAZING and we're gonna CRUSH IT together! This is gonna be LEGENDARY! ARE YOU READY?! LET'S DO THIS! 💪😤🚀
terminal:
  backend: local
  cwd: .
  timeout: 180
  home_mode: auto
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200
  container_persistent: true
  docker_mount_cwd_to_workspace: false
  lifetime_seconds: 300
web:
  backend: firecrawl
  use_gateway: true
browser:
  inactivity_timeout: 120
  cloud_provider: browser-use
  use_gateway: true
tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: false
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
  protect_first_n: 3
  codex_gpt55_autoraise: true
  codex_app_server_auto: native
prompt_caching:
  cache_ttl: 5m
display:
  compact: true
  personality: concise
  busy_input_mode: interrupt
  bell_on_complete: false
  show_reasoning: true
  streaming: true
  show_cost: true
  skin: poseidon
  interim_assistant_messages: true
  tool_progress: all
  cleanup_progress: false
  long_running_notifications: true
  busy_ack_detail: true
  background_process_notifications: all
dashboard:
  theme: mono
  basic_auth: '{}'
tts:
  provider: edge
  edge:
    voice: en-GB-RyanNeural
    voice_id: en-GB-RyanNeural
  elevenlabs:
    voice_id: JBFqnCBsd6RMkjVDRZzb
    model_id: eleven_flash_v2_5
    model: George
  use_gateway: true
stt:
  enabled: true
  provider: local
  local:
    model: base
  openai:
    model: whisper-1
  use_gateway: true
voice:
  auto_tts: false
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  provider: openviking
  nudge_interval: 10
  flush_min_turns: 6
moa:
  presets:
    default:
      fanout: per_iteration
    review:
      enabled: true
      reference_models:
        - provider: openrouter
          model: nvidia/nemotron-3-super-120b-a12b:free
        - provider: naga
          model: nemotron-3-ultra-550b-a55b:free
  aggregator:
    provider: openrouter
    model: nvidia/nemotron-3-super-120b-a12b:free
  max_tokens: 4096
  fanout: per_iteration
  enabled: true
skills:
  creation_nudge_interval: 15
  disabled:
    - claude-code
    - codex
    - opencode
    - ascii-video
    - claude-design
    - excalidraw
timezone: America/Phoenix
approvals:
  mode: smart
  destructive_slash_confirm: false
command_allowlist:
  - script execution via -e/-c flag
  - stop/restart system service
  - overwrite system file via redirection
code_execution:
  timeout: 300
  max_tool_calls: 50
streaming:
  enabled: false
onboarding:
  seen:
    profile_build_offered: true
    busy_input_prompt: true
    tool_progress_prompt: true
updates:
  pre_update_backup: false
  backup_keep: 5
  non_interactive_local_changes: stash
session_reset:
  mode: none
  idle_minutes: 1440
  at_hour: 4
group_sessions_per_user: true
platform_toolsets:
  cli:
    - hermes-cli
  telegram:
    - hermes-telegram
  discord:
    - hermes-discord
  whatsapp:
    - hermes-whatsapp
  slack:
    - hermes-slack
  signal:
    - hermes-signal
  homeassistant:
    - hermes-homeassistant
  qqbot:
    - hermes-qqbot
  yuanbao:
    - hermes-yuanbao
  teams:
    - hermes-teams
  google_chat:
    - hermes-google_chat
image_gen:
  use_gateway: true
platforms:
  webhook:
    enabled: true
plugins:
  enabled:
    - web-search-plus
  disabled: []
mcp_servers:
  perseus-vault:
    command: /home/opc/.local/bin/perseus-vault-remote
    args:
      - serve
      - --db
      - /home/opc/.perseus-vault/data/perseus-vault.db
    enabled: true
fallback_providers:
  - provider: nvidia
    model: nvidia/nemotron-3-nano-omni-30b-a3b-reasoning
  - provider: openrouter
    model: nvidia/nemotron-3-super-120b-a12b:free
webui:
  dashboard:
    enabled: auto
    url: http://100.111.80.59:8642